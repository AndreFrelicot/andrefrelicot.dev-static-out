o de um projeto.\n\nO objetivo é simples:\n**reduzir a distância entre uma ideia e sua colocação em produção.**\n\n\u003cdiv style={{marginTop: '2rem', marginBottom: '2rem'}}\u003e\n  \u003ca href=\"https://appexpress.fr\" target=\"_blank\" rel=\"noopener noreferrer\"\u003e\n    \u003cThemeImage\n      lightSrc=\"/images/2026/appexpress-og.jpg\"\n      darkSrc=\"/images/2026/appexpress-og.jpg\"\n      alt=\"AppExpress - Da ideia à produção\"\n      width={600}\n      height={315}\n    /\u003e\n  \u003c/a\u003e\n\u003c/div\u003e\n\nA plataforma já permite:\n- compor uma oferta a partir de blocos explícitos\n- obter uma estimativa de orçamento e prazos\n- agendar uma reunião\n- ou se inscrever na newsletter para acompanhar a evolução da oferta\n\nA estimativa serve como base de discussão.\nA proposta final é validada após uma troca, mas o ponto de partida é intencionalmente claro.\n\nA oferta se baseia em alguns princípios assumidos:\n- um único interlocutor do início ao fim\n- zero terceirização\n- uma abordagem pragmática, focada na entrega\n- a possibilidade de começar com ou sem protótipos\n\nMobile, web, SaaS ou IA generativa:\no objetivo continua sendo o mesmo, **entregar um produto funcional**.\n\n---\n\n### Próximos passos\n\n- **Dois projetos de demonstração** para ilustrar concretamente a oferta e os blocos utilizados.\n- **O CRM AppExpress**, permitindo acompanhar o progresso de um projeto, trocar mensagens e validar etapas,\n  acessível via painel web e aplicativo mobile.\n\n  O aplicativo mobile será disponibilizado em Ionic, React Native e nativo (iOS Swift / Android Kotlin).\n\n- **Outros projetos voltados à IA generativa**,\n  para explorar e demonstrar usos concretos: **pesquisa inteligente, geração de conteúdo, assistentes e automações.**\n"])</script><script>self.__next_f.push([1,"1d:T85b,"])</script><script>self.__next_f.push([1,"  \n\n\u003cThemeImage lightSrc=\"/images/2025/llmvoice.webp\" darkSrc=\"/images/2025/llmvoice.webp\" alt=\"LLMVoice em ação\" width={800} height={600} priority={true} /\u003e  \n\n\u003cbr/\u003e  \n\nAqui está o **LLMVoice**, uma demonstração técnica que permite avaliar as novas APIs de reconhecimento de voz do iOS 26 (**SpeechAnalyzer / SpeechTranscriber**) e a execução de modelos **LLM de código aberto** (quantizados em **4 bits**) localmente em um iPhone compatível com o framework **MLX**.  \n\nVocê pode resumir uma transcrição ou enviar um prompt diretamente para o modelo.  \nVamos ser honestos — modelos tão compactados não são realmente úteis, mas é divertido vê-los “alucinar”.  \nAinda assim, há potência suficiente para colocar meu velho iPhone 13 de joelhos!  \n\nAqui estão os modelos disponíveis para download:  \n\u003cbr/\u003e  \n\n**Gemma3_1b** (mlx-community/gemma-3-1b-it-4bit) \u003cbr/\u003e\n**Qwen25_05b** (lmstudio-community/Qwen2.5-0.5B-Instruct-MLX-4bit) \u003cbr/\u003e\n**Llama32_1b** (mlx-community/Llama-3.2-1B-Instruct-4bit) \u003cbr/\u003e\n\n## Código-fonte\n\n\u003cGitHubLink href=\"https://github.com/AndreFrelicot/llmvoice\" label=\"Código-fonte LLMVoice\" /\u003e  \n\n## Requisitos do sistema  \n\n**iOS 26.0+ / iPadOS 26.0+**  \n\n### Para Apple Intelligence  \n- iPhone 15 Pro ou modelo posterior  \n- Apple Intelligence ativada nas configurações  \n\n### Para modelos locais MLX  \n- iPhone 12 ou modelo posterior (chip A14 Bionic ou superior)  \n- iPad Pro 2021 ou modelo posterior (chip M1 ou superior)  \n- iPad Air 5ª geração ou modelo posterior (chip M1 ou superior)  \n\u003cbr/\u003e  \nGPU Metal com recursos específicos: **air.simd_sum**, suporte ao kernel **rmsfloat16**.  \n\n### Armazenamento  \n- Tamanho do app: aproximadamente **50 MB**  \n- Downloads de modelos (somente MLX):  \n  - **Qwen2.5 (0,5B)**: aproximadamente **150 MB**  \n  - **Gemma 3 (1B)**: aproximadamente **300 MB**  \n  - **Llama 3.2 (1B)**: aproximadamente **500 MB**  \n\u003cbr/\u003e  \n\n\u003cbr/\u003e\n\u003cAppStoreLink href=\"https://apps.apple.com/us/app/llmvoice/id6753925010\" /\u003e\n\n---\n## 🛟 Suporte\nPrecisa de ajuda ou quer enviar feedback? Escreva para [support@andrefrelicot.dev](mailto:support@andrefrelicot.dev).\n"])</script><script>self.__next_f.push([1,"1e:T139e,"])</script><script>self.__next_f.push([1,"\n\u003cThemeImage\n  lightSrc=\"/images/2025/ble-uscope.webp\"\n  darkSrc=\"/images/2025/ble-uscope.webp\"\n  alt=\"BLE UScope App Screenshot\"\n  width={800}\n  height={600}\n  priority={true}\n/\u003e\n\n# **BLE UScope – Scanner e Analisador Avançado de Bluetooth Low Energy**\n\n**BLE UScope** é uma ferramenta de análise profissional de Bluetooth Low Energy projetada para desenvolvedores, engenheiros, profissionais de IoT e entusiastas de tecnologia que precisam de uma visão completa dos dispositivos BLE.\n\n\n## ⚙️ Recursos Principais\n\n### **Descoberta e Varredura de Dispositivos**\nEscaneie e descubra dispositivos Bluetooth Low Energy próximos em tempo real.  \nExiba informações detalhadas, incluindo:\n- Nomes dos dispositivos  \n- Intensidade do sinal (RSSI)  \n- Dados do fabricante  \n- Serviços anunciados  \n- Status da conexão  \n\nOpções avançadas de filtragem ajudam você a encontrar rapidamente dispositivos específicos.\n\n\n### **Explorador de Serviços GATT**\nAprofunde-se na arquitetura do dispositivo com uma exploração completa do GATT.  \n- Navegue por serviços, características e descritores em uma visualização hierárquica clara  \n- Leia, escreva e monitore valores de características (hex, UTF-8, decimal)  \n- Ative notificações para receber atualizações em tempo real dos seus dispositivos  \n\n\n### **Categorização Inteligente de Dispositivos**\nIdentifica e categoriza automaticamente dispositivos como:\n- Pulseiras fitness  \n- Monitores de frequência cardíaca  \n- Smartwatches  \n- Fones de ouvido  \n- Teclados  \n- Controles de jogo  \n\nCategorias com cores e ícones personalizados tornam a identificação intuitiva.\n\n\n### **Gerenciamento de Conexões**\n- Conecte-se a vários dispositivos simultaneamente  \n- Monitore a qualidade da conexão em tempo real  \n- Veja duração da conexão, tendências de sinal e métricas de estabilidade  \n- Reconecte-se automaticamente aos dispositivos favoritos quando desconectados  \n\n\n### **Análises Avançadas**\nAcompanhe e visualize métricas como:\n- RSSI ao longo do tempo  \n- Indicadores de qualidade da conexão  \n- Cálculo estimado de distância  \n- Níveis de potência TX  \n\nLogs detalhados ajudam você a monitorar padrões de descoberta e eventos de conexão.\n\n\n### **Ferramentas de Diagnóstico**\nExecute testes completos nos dispositivos conectados:\n- Estabilidade da conexão  \n- Medições de throughput  \n- Validação de características  \n\nExporte os resultados de diagnóstico para análise ou documentação.\n\n\n### **Gerenciamento de Dados**\n- Salve dispositivos favoritos para acesso rápido  \n- Exporte perfis de dispositivos, estruturas GATT e dados de características  \n- Copie valores, UUIDs e outros dados com um único toque  \n\nPerfeito para integração fluida no seu fluxo de desenvolvimento.\n\n\n### **Recursos para Desenvolvedores**\n- Visualização completa da hierarquia GATT  \n- Inspeção de propriedades de características *(read, write, notify, indicate)*  \n- Exploração e análise de descritores  \n- Análise e exibição de dados de anúncio  \n- Busca de UUIDs com nomes padrão do Bluetooth SIG  \n- Decodificação de dados do fabricante  \n- Monitoramento e registro de valores em tempo real  \n\n\n## 🔒 Privacidade e Segurança\nSua privacidade é prioridade.  \n**BLE UScope opera totalmente no seu dispositivo** — sem coleta de dados.  \n- Nenhuma conexão com a internet necessária  \n- Sem análises  \n- Sem rastreamento  \n\nToda a varredura, análise e armazenamento acontecem localmente no seu dispositivo iOS.\n\n\n## 👩‍💻 Ideal Para\n- Desenvolvedores iOS que criam aplicativos com BLE  \n- Engenheiros de hardware testando periféricos BLE  \n- Profissionais de IoT depurando dispositivos conectados  \n- Pesquisadores de segurança analisando implementações BLE  \n- Estudantes aprendendo sobre Bluetooth Low Energy  \n- Entusiastas de tecnologia explorando o mundo sem fio  \n\n\n## 🧠 Especificações Técnicas\n- Compatível com todos os perfis padrão de Bluetooth Low Energy  \n- Compatível com dispositivos Bluetooth 4.0 → 5.3  \n- Leitura e escrita em todas as características acessíveis  \n- Suporte a notificações e indicações  \n- Suporte a múltiplas conexões simultâneas  \n- Descoberta automática de serviços  \n- Tradução de UUIDs para serviços e características padrão  \n\n\n## 🎨 Experiência do Usuário\nInterface limpa e moderna projetada para iOS — com suporte total a **modo claro e escuro**.  \nNavegação intuitiva com arquitetura baseada em abas.  \nAções contextuais e dicas úteis guiam você em cada operação.\n\n\n### **Baixe o BLE UScope hoje mesmo**\nObtenha uma **visão profissional** dos dispositivos Bluetooth Low Energy ao seu redor.\n\n\u003cbr /\u003e\n\n\u003cAppStoreLink href=\"https://apps.apple.com/us/app/ble-uscope/id6753627148\" /\u003e\n\u003cPlayStoreLink href=\"https://play.google.com/store/apps/details?id=dev.andrefrelicot.bleuscope\" /\u003e\n\n---\n## 🛟 Suporte\nPrecisa de ajuda ou quer enviar feedback? Escreva para [support@andrefrelicot.dev](mailto:support@andrefrelicot.dev).\n"])</script><script>self.__next_f.push([1,"1f:Td61,"])</script><script>self.__next_f.push([1,"\n\u003cThemeImage\n  lightSrc=\"/images/2025/decibelpeak.webp\"\n  darkSrc=\"/images/2025/decibelpeak.webp\"\n  alt=\"Captura de tela do aplicativo Decibel Peak\"\n  width={800}\n  height={600}\n  priority={true}\n/\u003e\n\n# Visão Geral\n\nDecibel Peak é um aplicativo de medidor de decibéis de precisão desenvolvido para iOS, oferecendo medições confiáveis de nível de som para entusiastas e usuários que precisam de monitoramento de ruído preciso. Seja para monitorar níveis de ruído no ambiente, acompanhar variações sonoras ao longo do tempo ou simplesmente matar a curiosidade sobre o ambiente acústico ao seu redor, o Decibel Peak oferece recursos de medição de som práticos e fáceis de usar.\n\n## Principais Recursos\n\n### 🎯 Medição de Precisão\n- Monitoramento em tempo real do nível de decibéis com alta precisão  \n- Detecção precisa de nível sonoro usando o microfone do dispositivo  \n- Feedback visual suave e responsivo com curvas dinâmicas  \n- Medições consistentes para acompanhamento confiável de tendências  \n\n### 📱 Otimizado para iOS\n- Aplicativo nativo para iOS  \n- Interface em SwiftUI otimizada para desempenho fluido  \n- Design responsivo que se adapta a diferentes tamanhos de tela  \n- Experiência do usuário moderna e intuitiva  \n\n### 📊 Excelência Visual\n- Visualização em tempo real dos níveis de som  \n- Curvas suaves em gradiente que reagem ao áudio de entrada  \n- Interface limpa e minimalista  \n- Exibições de medição fáceis de ler  \n\n### ⚡ Desempenho Otimizado\n- Aplicativo leve com impacto mínimo na bateria  \n- Algoritmos eficientes de processamento de áudio  \n- Inicialização instantânea e controles responsivos  \n- Otimizado para iPhone  \n\n## Casos de Uso\n\n**Aplicações de Referência:**  \n- Conscientização sobre ruído ambiental  \n- Monitoramento de níveis sonoros em locais de trabalho  \n- Comparação de equipamentos de áudio  \n- Experimentos educacionais de nível sonoro  \n\n**Uso Pessoal:**  \n- Monitoramento de ruído em casa  \n- Verificação de nível de som em eventos  \n- Experimentos sonoros educacionais  \n- Curiosidade geral sobre ruído ambiente  \n\n## Especificações Técnicas\n\n- **Plataforma:** iOS 17.0+  \n- **Framework:** Desenvolvido com SwiftUI para desempenho nativo  \n- **Processamento de Áudio:** Análise de nível sonoro em tempo real  \n- **Interface:** Interface de usuário moderna e adaptável  \n- **Desempenho:** Otimizado para eficiência de bateria  \n\n## Privacidade \u0026 Segurança\n\nO Decibel Peak respeita sua privacidade:  \n- Nenhuma gravação ou armazenamento de áudio  \n- Processamento somente em tempo real  \n- Nenhuma transmissão de dados para servidores externos  \n- Todas as medições processadas localmente no seu dispositivo  \n\n## Código Fonte\n\n\u003cGitHubLink href=\"https://github.com/AndreFrelicot/DecibelPeak\" label=\"Código fonte iOS\" /\u003e\n\u003cGitHubLink href=\"https://github.com/AndreFrelicot/DecibelPeak-android\" label=\"Código fonte Android\" /\u003e\n\n## Download\n\nDisponível na App Store e Google Play.\n\u003cbr /\u003e\n\u003cAppStoreLink href=\"https://apps.apple.com/app/decibelpeak/id6752702602\" /\u003e\n\u003cPlayStoreLink href=\"https://play.google.com/store/apps/details?id=dev.andrefrelicot.decibelpeak\" /\u003e\n\n---\n\n## Suporte \u0026 Contato\n**Desenvolvedor:** André Frélicot  \n**Suporte:** support@andrefrelicot.dev  \n\nTransforme sua experiência de monitoramento de som com o Decibel Peak – onde a precisão encontra a simplicidade.\n"])</script><script>self.__next_f.push([1,"20:T4cb,\n\u003cThemeImage\n  lightSrc=\"/images/2025/hello-world.webp\"\n  darkSrc=\"/images/2025/hello-world.webp\"\n  alt=\"Where everything is built\"\n  width={800}\n  height={600}\n  priority={true}\n/\u003e\n\n# Bem-vindo ao meu Devlog!  \n\nAqui vou compartilhar meu caminho e minhas explorações em novas tecnologias, com o objetivo de criar e distribuir novos produtos.  \n\nEstou começando pelo desenvolvimento de aplicações *showcase*, móveis e web. As aplicações comerciais virão nos próximos meses.  \n\nMeus principais interesses são:  \n- o **mobile**  \n- o **áudio** (DSP, VST/AU)  \n- a **música** (MIDI, teoria)  \n- os **gráficos** (3D, GPU, visualização, shaders)  \n- a **VR/XR** (Meta Quest, Apple Vision)  \n- o **ciberespaço** em geral (redes sociais, viralidade, IoT, etc.)  \n- a **IA generativa**  \n- o **Web 3.0** (blockchain, cryptos). \n\n\nTambém me interesso pela criação de **mini-jogos eletrônicos**, sejam ideias originais ou adaptações.  \n\nA longo prazo, vou operar sob diferentes bandeiras:  \n- **Osibits** para distribuição comercial e freelancing  \n- outra entidade para produção de software  \n- uma terceira para criação de conteúdo (som, música, imagens, vídeos, VFX 3D, etc.)  \n\n---\n\n**Fique ligado!**\n21:T7b1,"])</script><script>self.__next_f.push([1,"\n\u003cThreeCube /\u003e\n\n# Sobre\n\nSou desenvolvedor de software (CTO, Architect, Tech Lead) há mais de 25 anos, em empresas, startups e como freelancer.\nTrabalhei em projetos variados: softwares de gestão, aplicativos móveis integrando machine learning e streaming de vídeo, aplicativos médicos que exigem sistemas avançados de visualização (MedTech, DeepTech, renderização volumétrica distribuída, 4D Flow, clusters de GPU na nuvem), além de aplicativos móveis utilizando comunicação Bluetooth LE em tempo real (incluindo o desenvolvimento de firmware para dispositivos BLE).\n\nEm 2025, inicio um novo capítulo: explorar as oportunidades oferecidas pela IA (LLM, deep learning) para criar novos tipos de produtos. Continuando profundamente conectado à parte técnica, também me interesso pelos novos modos de consumo de software: viralidade, aquisição de clientes pelas redes sociais (UGC) e estratégias de marketing. Onde o software se funde com o conteúdo.\n\nMeu papel evolui assim para o de **Digital Strategist**, para imaginar, distribuir e vender tanto aplicativos móveis quanto soluções SaaS.\n\n**Mote: Tech – Product – Business**\n\n---\n\n# Freelancing \u0026 Consulting\n\n**Ajudo empresas a transformar suas ideias em aplicativos móveis e web de alta performance.**\n\nEstou disponível para projetos como freelancer.\nDou preferência ao desenvolvimento de aplicativos móveis iOS (**SwiftUI**), Android (**Kotlin, Jetpack Compose**) e cross-platform (**React Native, Flutter, Ionic**), assim como aplicações web modernas (**React / Next.js**), implantadas em soluções de nuvem de alta performance (**Vercel, CloudFlare, AWS, Convex, Supabase, Neon, Firebase**).\n\nMinha taxa é de **75€/h** (ou **600€/dia**).\n\n📩 Contato: **andre@frelicot.com**\n\n---\n\n# Empresa\n\n**Osibits**\u003cbr /\u003e\n60 rue François 1er\u003cbr /\u003e\n75008 Paris\u003cbr /\u003e\nFRANÇA\n\nD-U-N-S® Number: 283708389\u003cbr /\u003e\nSIRET: 939 948 865 00018\u003cbr /\u003e\nTVA/VAT: FR56 939948865\n\n\u003cOsibitsLogo /\u003e\n"])</script><script>self.__next_f.push([1,"e:[\"$\",\"div\",null,{\"className\":\"mx-auto max-w-5xl px-4 py-12 sm:px-6 sm:py-14\",\"children\":[[\"$\",\"$L5\",null,{\"locale\":\"pt\",\"navLinks\":[{\"href\":\"/pt\",\"label\":\"Devlogs\"},{\"href\":\"/pt?tag=apps\",\"label\":\"Apps\"},{\"href\":\"/pt/2025/09/sobre\",\"label\":\"Sobre\"}],\"title\":[\"$\",\"div\",null,{\"className\":\"flex flex-col leading-tight\",\"children\":[[\"$\",\"h1\",null,{\"className\":\"text-3xl font-bold tracking-tight sm:text-4xl\",\"children\":\"André Frélicot\"}],[\"$\",\"span\",null,{\"className\":\"mt-1 text-xs font-semibold uppercase tracking-[0.28em] text-foreground/55 sm:text-sm sm:tracking-[0.32em]\",\"children\":\"TechLead \u0026 Entrepreneur\"}]]}],\"languagePath\":\"$undefined\",\"languagePaths\":\"$undefined\"}],[\"$\",\"main\",null,{\"className\":\"mt-8 pb-10\",\"children\":[\"$\",\"$10\",null,{\"fallback\":null,\"children\":[\"$\",\"$L1b\",null,{\"locale\":\"pt\",\"copy\":{\"placeholder\":\"Busque conteúdo pelo título ou corpo...\",\"allLabel\":\"Todos\",\"empty\":\"Nenhum conteúdo correspondente ainda.\",\"showTags\":\"Mostrar tags e busca\",\"hideTags\":\"Ocultar tags e busca\",\"loadMore\":\"Carregar mais resultados\"},\"initialDocs\":[{\"slug\":\"appexpress-pre-lancamento\",\"title\":\"AppExpress – Pré-lançamento da oferta\",\"description\":\"Seus aplicativos, chave na mão, sob medida.\",\"tags\":[\"appexpress\",\"mobile\",\"web\",\"saas\",\"development\",\"offer\",\"business\",\"b2b\",\"ios\",\"android\",\"vercel\",\"convex\",\"flutter\"],\"content\":\"$1c\",\"image\":\"/images/2026/appexpress.webp\",\"date\":\"2026-01-13\"},{\"slug\":\"llmvoice\",\"title\":\"LLMVoice 1.0\",\"description\":\"Demonst
