tere.\n\n### PME com PostgreSQL existente\n\n**-\u003e pgvector**\n\nVocĂŞ jĂĄ tem PostgreSQL em produĂ§ĂŁo, uma equipe que conhece e backups. Adicione pgvector como migraĂ§ĂŁo SQL. Os vetores vivem junto aos dados de negĂłcio.\n\nSe passar de 5 a 10 milhĂľes de vetores ou a latĂŞncia se tornar crĂ­tica, serĂĄ hora de migrar para um banco especializado.\n\n### Scale-up / grande volume\n\n**-\u003e Pinecone ou Qdrant**\n\nVocĂŞ tem dezenas de milhĂľes de documentos, trĂĄfego sustentado e requisitos de latĂŞncia. Pinecone se quiser zero ops. Qdrant se quiser controle e tiver equipe para operar, ou Qdrant Cloud.\n\n### Enterprise Google Cloud\n\n**-\u003e Vertex AI RAG Engine + Qdrant/Pinecone para casos avanĂ§ados**\n\nVertex AI cobre casos padrĂŁo. Qdrant ou Pinecone cobrem casos que exigem controle fino. Google Search grounding ĂŠ diferencial se usuĂĄrios precisam de informaĂ§ĂŁo pĂşblica atual.\n\n### Enterprise multi-cloud\n\n**-\u003e Qdrant ou Weaviate self-hosted**\n\nVocĂŞ nĂŁo quer vendor lock-in. Qdrant e Weaviate rodam em qualquer Kubernetes. VocĂŞ mantĂŠm controle total sobre dados e infraestrutura.\n\n### ProtĂłtipo rĂĄpido\n\n**-\u003e ChromaDB ou OpenAI File Search**\n\nVocĂŞ quer validar uma ideia em uma tarde. ChromaDB se usa Python e quer entender a mecĂ˘nica. OpenAI File Search se sĂł quer ver RAG funcionando sem gerenciar vetores.\n\nNĂŁo coloque nenhum dos dois em produĂ§ĂŁo em larga escala.\n\n## ConclusĂŁo: RAG nĂŁo ĂŠ uma Ăşnica escolha\n\nRAG nĂŁo ĂŠ um produto que se compra. Ă um **espectro arquitetural**, de \"trĂŞs linhas de cĂłdigo com OpenAI File Search\" a \"pipeline distribuĂ­do com Qdrant, reranking Cohere e avaliaĂ§ĂŁo contĂ­nua\".\n\nA escolha certa depende de trĂŞs fatores:\n\n1. **Onde vocĂŞ estĂĄ**: protĂłtipo, MVP ou produĂ§ĂŁo estabelecida.\n2. **O que vocĂŞ tem**: equipe DevOps, PostgreSQL existente, Google Cloud.\n3. **O que vocĂŞ precisa**: volume, latĂŞncia, precisĂŁo.\n\n**O pior erro ĂŠ sobre-arquitetar.** Arquiteturas RAG multiagente parecem atraentes, mas a experiĂŞncia mostra que muitos sistemas ambiciosos demais nĂŁo se sustentam em produĂ§ĂŁo. Cada chamada LLM adicional multiplica a taxa de erro. Se um modelo tem 5% de erro, encadear vĂĄrias chamadas reduz bastante a confiabilidade global.\n\nComece com a soluĂ§ĂŁo mais simples que resolve a necessidade imediata. pgvector ou Convex para um primeiro RAG em produĂ§ĂŁo. ChromaDB para um POC. Migre quando, e somente quando, alcanĂ§ar os limites.\n\nO segundo pior erro ĂŠ subestimar o trabalho prĂŠvio. O melhor banco vetorial do mundo nĂŁo compensa dados mal preparados, chunking inadequado ou modelo de embedding mal escolhido. PreparaĂ§ĂŁo de dados e engenharia de negĂłcio representam a maior parte do esforĂ§o.\n\nO terceiro erro costuma ser invisĂ­vel: negligenciar a interface. Um RAG tecnicamente sĂłlido atrĂĄs de uma caixa de texto serĂĄ subutilizado. Pense em RAG como produto para usuĂĄrios de negĂłcio, nĂŁo apenas como pipeline tĂŠcnico.\n\n**Uma nota sobre tendĂŞncias**: acompanhe arquiteturas sobre object storage como Turbopuffer, GraphRAG para casos que exigem exaustividade e rastreabilidade de relaĂ§Ăľes, e Self-RAG para pipelines agentic mais confiĂĄveis. RAG nĂŁo estĂĄ desaparecendo. Ele evolui para uma infraestrutura central de conhecimento para IA empresarial.\n\n**Precisa de ajuda para escolher?** Na AppExpress, implementamos sistemas RAG para PMEs, de um POC em uma semana a pipelines de produĂ§ĂŁo com avaliaĂ§ĂŁo contĂ­nua. Se vocĂŞ estĂĄ em dĂşvida entre opĂ§Ăľes ou quer validar sua arquitetura antes de se comprometer, [vamos conversar](https://appexpress.fr).\n"])</script><script>self.__next_f.push([1,"27:T29a3,"])</script><script>self.__next_f.push([1,"\n\u003cThemeImage\n  lightSrc=\"/images/2026/appexpress/applications-metier-interrogeables-par-ia/cover.webp\"\n  darkSrc=\"/images/2026/appexpress/applications-metier-interrogeables-par-ia/cover.webp\"\n  alt=\"Aplicativo de negĂłcio, mobile e IA\"\n  width={1600}\n  height={893}\n  priority={true}\n/\u003e\n\n\u003cAppExpressSourceBanner\n  href=\"https://appexpress.fr/blog/applications-metier-interrogeables-par-ia\"\n  linkLabel=\"Ler o artigo original\"\n\u003e\n  Este artigo vem de AppExpress.fr.\n\u003c/AppExpressSourceBanner\u003e\n\nFala-se muito de inteligĂŞncia artificial nas empresas. Mas, na maioria delas, a realidade ĂŠ mais concreta: os dados Ăşteis, clientes, projetos, estoques, faturas e intervenĂ§Ăľes, vivem em um aplicativo de negĂłcio acessĂ­vel apenas por um navegador web, em uma estaĂ§ĂŁo fixa.\n\nIsso ĂŠ um bom comeĂ§o. Mas ĂŠ apenas uma parte da equaĂ§ĂŁo.\n\nUm aplicativo de negĂłcio realmente eficiente hoje se apoia em **trĂŞs camadas complementares**: a interface web para o trabalho diĂĄrio, o aplicativo mobile para o campo e uma camada de inteligĂŞncia artificial para automaĂ§ĂŁo.\n\n\u003cThemeImage\n  lightSrc=\"/images/2026/appexpress/applications-metier-interrogeables-par-ia/layers-pt.webp\"\n  darkSrc=\"/images/2026/appexpress/applications-metier-interrogeables-par-ia/layers-pt.webp\"\n  alt=\"As trĂŞs camadas de um aplicativo de negĂłcio moderno\"\n  width={1600}\n  height={893}\n/\u003e\n\n## A interface web: a estaĂ§ĂŁo de trabalho central\n\nEla ĂŠ o coraĂ§ĂŁo do sistema. A interface web continua indispensĂĄvel para:\n\n- gerenciar projetos, contratos e faturas;\n- acompanhar conversas com clientes e intervenĂ§Ăľes em tempo real;\n- visualizar dashboards e indicadores;\n- administrar permissĂľes de acesso e configuraĂ§Ăľes.\n\nSeja um CRM, uma ferramenta de acompanhamento de obras, um software de gestĂŁo de estoque ou um planejamento de equipe, o princĂ­pio ĂŠ o mesmo: a interface web ĂŠ estruturada, completa e pensada para o trabalho no escritĂłrio. **NĂŁo se trata de substituĂ­-la.** Mas ela tem limites: ĂŠ preciso estar diante de uma tela, conectado, e saber onde procurar a informaĂ§ĂŁo.\n\n## O aplicativo mobile: acesso em campo\n\nEssa ĂŠ a camada que falta com mais frequĂŞncia. No entanto, ĂŠ ela que mais muda o cotidiano das equipes que nĂŁo trabalham atrĂĄs de uma mesa.\n\nUm profissional em uma obra, um vendedor em reuniĂŁo, um tĂŠcnico em intervenĂ§ĂŁo, um gestor em deslocamento: todos precisam acessar seus dados **onde estĂŁo**, nĂŁo apenas onde estĂĄ o computador.\n\nUm aplicativo mobile bem desenhado permite:\n\n- **receber notificaĂ§Ăľes push**: nova solicitaĂ§ĂŁo de cliente, ticket urgente, fatura vencida, intervenĂ§ĂŁo planejada;\n- **validar rapidamente**: aceitar um orĂ§amento, assinar um documento, confirmar uma etapa de obra;\n- **consultar de relance**: status de um projeto, histĂłrico de um cliente, nĂ­vel de estoque, agenda do dia;\n- **capturar informaĂ§Ăľes em campo**: foto de documento, observaĂ§ĂŁo, nota de voz, comentĂĄrio rĂĄpido;\n- **manter a reatividade**: responder a um cliente em 2 minutos em vez de 2 horas.\n\n\u003cCallout type=\"info\" title=\"O ponto-chave\"\u003e\n  O mobile nĂŁo substitui a interface web. Ele estende o acesso ao seu aplicativo de negĂłcio para alĂŠm do escritĂłrio, onde o negĂłcio realmente acontece.\n\u003c/Callout\u003e\n\nNĂŁo ĂŠ uma \"versĂŁo reduzida\" do seu software. Ă o mesmo banco de dados, as mesmas permissĂľes de acesso, a mesma lĂłgica de negĂłcio, mas em um formato adaptado a uma tela de bolso e ao uso em mobilidade.\n\n## A camada de IA: automaĂ§ĂŁo inteligente\n\nAgora, imagine adicionar uma terceira camada: um acesso estruturado aos dados do seu aplicativo, utilizĂĄvel por um LLM, ou seja, um modelo de linguagem como Claude ou ChatGPT.\n\nO princĂ­pio ĂŠ simples. Em vez de navegar por menus para encontrar a informaĂ§ĂŁo, criamos **pontos de acesso dedicados** que a IA pode consultar. NĂŁo um acesso bruto a todo o banco, mas visĂľes direcionadas, seguras, que respondem Ă s perguntas de negĂłcio mais frequentes.\n\nNa prĂĄtica, isso pode assumir a forma de uma linha de comando ou de um conector MCP (Model Context Protocol), que permite a uma IA de desktop consultar diretamente sua ferramenta de negĂłcio.\n\n### O que isso permite\n\nAlguns exemplos conforme o tipo de aplicativo:\n\n**GestĂŁo de clientes / CRM:**\n\n- *\"Resuma a situaĂ§ĂŁo do cliente Martin: projetos, pagamentos, tickets\"*\n- *\"Redija um email de cobranĂ§a para cada fatura vencida\"*\n\n**Acompanhamento de obras:**\n\n- *\"Quais obras atrasaram esta semana?\"*\n- *\"Liste as intervenĂ§Ăľes nĂŁo validadas hĂĄ mais de 3 dias\"*\n\n**GestĂŁo de estoque:**\n\n- *\"Quais produtos estĂŁo abaixo do limite de reposiĂ§ĂŁo?\"*\n- *\"Prepare um pedido a fornecedor com base nas vendas do mĂŞs\"*\n\n**Planejamento / RH:**\n\n- *\"Quem estĂĄ disponĂ­vel na prĂłxima semana para uma intervenĂ§ĂŁo em Rennes?\"*\n- *\"Resuma as horas extras do mĂŞs por equipe\"*\n\n\u003cCallout type=\"tip\" title=\"O ganho real\"\u003e\n  O que importa nĂŁo ĂŠ a velocidade da resposta. Ă o fato de perguntas que nunca eram feitas, porque demoravam demais para tratar, passarem a ser possĂ­veis.\n\u003c/Callout\u003e\n\n## As trĂŞs camadas em aĂ§ĂŁo: um cenĂĄrio concreto\n\nTomemos um CRM como exemplo, embora o princĂ­pio se aplique a qualquer aplicativo de negĂłcio.\n\n**Segunda-feira de manhĂŁ, 8h.** A IA analisa automaticamente o estado do aplicativo e detecta que uma fatura do cliente Durand estĂĄ vencida hĂĄ 7 dias, que um ticket de suporte ficou sem resposta e que o projeto associado nĂŁo avanĂ§ou nos Ăşltimos 10 dias.\n\n**8h05.** O gestor recebe uma **notificaĂ§ĂŁo push** no telefone: *\"Cliente Durand: 3 pontos de atenĂ§ĂŁo detectados\"*.\n\n**8h06.** Ele abre o **aplicativo mobile**, consulta o resumo preparado pela IA e aprova com um toque o envio de um email de cobranĂ§a jĂĄ redigido para a fatura.\n\n**8h10.** De volta ao escritĂłrio, o responsĂĄvel pelo projeto abre a **interface web** para tratar o ticket em profundidade, atualizar o planejamento do projeto e documentar a troca.\n\n\u003cThemeImage\n  lightSrc=\"/images/2026/appexpress/applications-metier-interrogeables-par-ia/timeline-pt.webp\"\n  darkSrc=\"/images/2026/appexpress/applications-metier-interrogeables-par-ia/timeline-pt.webp\"\n  alt=\"CenĂĄrio: da anĂĄlise por IA Ă  resoluĂ§ĂŁo em 10 minutos\"\n  width={1600}\n  height={893}\n/\u003e\n\n**Resultado:** em 10 minutos, trĂŞs problemas detectados, um tratado imediatamente e dois em resoluĂ§ĂŁo. Sem a IA, esses sinais poderiam ter passado despercebidos por dias.\n\nĂ isso que as trĂŞs camadas fazem quando trabalham juntas.\n\n## E amanhĂŁ: agentes autĂ´nomos\n\nAs trĂŞs camadas descritas acima jĂĄ sĂŁo operacionais. Mas a evoluĂ§ĂŁo natural vai mais longe: os **agentes de IA autĂ´nomos**.\n\nUm agente nĂŁo ĂŠ mais um LLM esperando uma pergunta. Ă um assistente que **age por conta prĂłpria** segundo regras definidas:\n\n- monitora seu aplicativo de negĂłcio continuamente;\n- detecta situaĂ§Ăľes que exigem uma aĂ§ĂŁo;\n- propĂľe ou executa diretamente essa aĂ§ĂŁo, com sua validaĂ§ĂŁo.\n\nPor exemplo: um agente pode analisar todas as manhĂŁs as faturas vencidas, redigir as cobranĂ§as e submetĂŞ-las para aprovaĂ§ĂŁo por notificaĂ§ĂŁo mobile. Sem que alguĂŠm precise pedir.\n\n### Para os mais ousados: OpenClaw\n\nPlataformas como [OpenClaw](https://openclaw.ai) jĂĄ permitem conectar agentes de IA Ă s suas ferramentas de negĂłcio: aplicativo de gestĂŁo, email, calendĂĄrio, mensagens. O agente se torna um verdadeiro colaborador digital: lĂŞ seus dados, raciocina sobre eles e pode agir em vĂĄrios canais, email, Telegram, interface web.\n\nIsso jĂĄ nĂŁo ĂŠ ficĂ§ĂŁo cientĂ­fica. Ă uma realidade acessĂ­vel, desde que exista um banco de dados bem estruturado e acessos seguros, exatamente o que as trĂŞs camadas anteriores ajudam a preparar.\n\n\u003cCallout type=\"tip\" title=\"A abordagem pragmĂĄtica\"\u003e\n  NĂŁo se comeĂ§a pelo agente autĂ´nomo. ComeĂ§a-se por uma aplicaĂ§ĂŁo sĂłlida, adiciona-se o mobile e depois a camada de IA. O agente chega naturalmente quando as bases estĂŁo prontas.\n\u003c/Callout\u003e\n\n## Por que essa abordagem funciona\n\nSeja vocĂŞ independente, artesĂŁo, PME ou uma estrutura maior, quando os recursos sĂŁo limitados, **muitas vezes sĂŁo as mesmas pessoas que fazem tudo**.\n\nĂ justamente por isso que essa abordagem funciona tĂŁo bem:\n\n- **A interface web** estrutura o trabalho e centraliza os dados\n- **O aplicativo mobile** permite manter a reatividade sem ficar preso ao escritĂłrio\n- **A IA** trata tarefas repetitivas e destaca o que realmente importa\n\nTudo isso com **custo controlado**: nĂŁo se reconstrĂłi o que jĂĄ existe, enriquece-se. Cada camada ĂŠ adicionada sem substituir a anterior.\n\n## A boa sequĂŞncia para comeĂ§ar\n\n1. **Uma aplicaĂ§ĂŁo web sĂłlida**: a fundaĂ§ĂŁo. Dados bem estruturados, permissĂľes claras, interface completa.\n2. **Um aplicativo mobile**: para estender o acesso ao campo e ganhar reatividade.\n3. **A camada de IA**: comeĂ§ar por 3 a 5 casos de uso de alto valor, testar com dados reais e depois ampliar.\n\n\u003cCallout type=\"warning\" title=\"Um ponto de atenĂ§ĂŁo\"\u003e\n  A seguranĂ§a continua sendo prioridade. Cada camada respeita as mesmas regras de acesso: um vendedor vĂŞ apenas seus clientes, um prestador vĂŞ apenas seu projeto. A IA nĂŁo ĂŠ exceĂ§ĂŁo.\n\u003c/Callout\u003e\n\n## Um parceiro, nĂŁo um prestador\n\nConstruir uma aplicaĂ§ĂŁo ĂŠ uma coisa. AdotĂĄ-la, fazĂŞ-la evoluir e extrair o mĂĄximo dela ĂŠ outra.\n\nĂ por isso que, na AppExpress, nĂŁo nos limitamos a entregar um produto. Acompanhamos nossos clientes **ao longo do tempo**:\n\n- **Consultoria inicial**: identificar as necessidades reais, evitar falsas boas ideias, enquadrar o projeto com eficiĂŞncia\n- **Desenvolvimento sob medida**: interface web, aplicativo mobile, integraĂ§ĂŁo de IA, cada bloco adaptado ao seu negĂłcio\n- **ImplantaĂ§ĂŁo e treinamento**: acompanhar suas equipes na adoĂ§ĂŁo das novas ferramentas\n- **EvoluĂ§ĂŁo contĂ­nua**: novas funcionalidades, ajustes, atualizaĂ§Ăľes, suporte tĂŠcnico\n\nO objetivo ĂŠ simples: fazer seu investimento digital **produzir resultados concretos**, nĂŁo acabar esquecido em uma gaveta.\n\n## ConclusĂŁo\n\nUm aplicativo de negĂłcio moderno jĂĄ nĂŁo ĂŠ apenas uma interface web. Ă um **ecossistema**: web para gestĂŁo, mobile para o campo, IA para automaĂ§ĂŁo.\n\nEssas trĂŞs camadas nĂŁo competem entre si. Elas se complementam. E ĂŠ a combinaĂ§ĂŁo delas que transforma uma simples ferramenta de gestĂŁo em uma verdadeira vantagem competitiva.\n\n---\n\n*Na AppExpress, concebemos e acompanhamos seus aplicativos de negĂłcio com trĂŞs dimensĂľes integradas desde o inĂ­cio: interface web, aplicativo mobile nativo e inteligĂŞncia artificial. Da consultoria inicial ao acompanhamento em produĂ§ĂŁo, um Ăşnico interlocutor. [Agende uma reuniĂŁo](https://appexpress.fr) para conversar.*\n"])</script><script>self.__next_f.push([1,"28:T87f,"])</script><script>self.__next_f.push([1,"\n\u003cThemeImage\n  lightSrc=\"/images/2026/appexpress.webp\"\n  darkSrc=\"/images/2026/appexpress.webp\"\n  alt=\"AppExpress\"\n  width={800}\n  height={600}\n  priority={true}\n/\u003e\n\n### AppExpress â PrĂŠ-lanĂ§amento da oferta\n\nA **prĂŠ-versĂŁo da oferta AppExpress** jĂĄ estĂĄ online.\n\nEsta ĂŠ uma primeira iteraĂ§ĂŁo da oferta como eu a imagino:\nclara, legĂ­vel e orientada Ă  execuĂ§ĂŁo, pronta para ser usada agora na estruturaĂ§ĂŁo de um projeto.\n\nO objetivo ĂŠ simples:\n**reduzir a distĂ˘ncia entre uma ideia e sua colocaĂ§ĂŁo em produĂ§ĂŁo.**\n\n\u003cdiv style={{marginTop: '2rem', marginBottom: '2rem'}}\u003e\n  \u003ca href=\"https://appexpress.fr\" target=\"_blank\" rel=\"noopener noreferrer\"\u003e\n    \u003cThemeImage\n      lightSrc=\"/images/2026/appexpress-og.jpg\"\n      darkSrc=\"/images/2026/appexpress-og.jpg\"\n      alt=\"AppExpress - Da ideia Ă  produĂ§ĂŁo\"\n      width={600}\n      height={315}\n    /\u003e\n  \u003c/a\u003e\n\u003c/div\u003e\n\nA plataforma jĂĄ permite:\n- compor uma oferta a partir de blocos explĂ­citos\n- obter uma estimativa de orĂ§amento e prazos\n- agendar uma reuniĂŁo\n- ou se inscrever na newsletter para acompanhar a evoluĂ§ĂŁo da oferta\n\nA estimativa serve como base de discussĂŁo.\nA proposta final ĂŠ validada apĂłs uma troca, mas o ponto de partida ĂŠ intencionalmente claro.\n\nA oferta se baseia em alguns princĂ­pios assumidos:\n- um Ăşnico interlocutor do inĂ­cio ao fim\n- zero terceirizaĂ§ĂŁo\n- uma abordagem pragmĂĄtica, focada na entrega\n- a possibilidade de comeĂ§ar com ou sem protĂłtipos\n\nMobile, web, SaaS ou IA generativa:\no objetivo continua sendo o mesmo, **entregar um produto funcional**.\n\n---\n\n### PrĂłximos passos\n\n- **Dois projetos de demonstraĂ§ĂŁo** para ilustrar concretamente a oferta e os blocos utilizados.\n- **O CRM AppExpress**, permitindo acompanhar o progresso de um projeto, trocar mensagens e validar etapas,\n  acessĂ­vel via painel web e aplicativo mobile.\n\n  O aplicativo mobile ĂŠ desenvolvido em Flutter, proporcionando uma experiĂŞncia nativa no iOS e Android a partir de uma Ăşnica base de cĂłdigo.\n\n- **Outros projetos voltados Ă  IA generativa**,\n  para explorar e demonstrar usos concretos: **pesquisa inteligente, geraĂ§ĂŁo de conteĂşdo, assistentes e automaĂ§Ăľes.**\n"])</script><script>self.__next_f.push([1,"29:T17b7,"])</script><script>self.__next_f.push([1,"\n\u003cThemeImage\n  lightSrc=\"/images/2025/llmvoice.webp\"\n  darkSrc=\"/images/2025/llmvoice.webp\"\n  alt=\"LLMVoice em aĂ§ĂŁo\"\n  width={800}\n  height={600}\n  priority={true}\n/\u003e\n\n**LLMVoice** ĂŠ uma demonstraĂ§ĂŁo tĂŠcnica iOS que serve de banco de provas para duas coisas: as novas APIs de reconhecimento de voz do iOS 26 (**SpeechAnalyzer / SpeechTranscriber**) e a execuĂ§ĂŁo de **LLMs open-weight** quantizados em **4 bits**, totalmente **em local** atravĂŠs do framework **MLX** da Apple.\n\nA ideia ĂŠ direta: vocĂŞ dita, o app transcreve e entĂŁo pode resumir a transcriĂ§ĂŁo ou enviar um prompt diretamente ao modelo. Tudo roda no dispositivo â sem servidor, sem chave de API, sem dados saindo do iPhone.\n\n\u003cCallout type=\"tip\" title=\"Novo: o primeiro modelo de raciocĂ­nio\"\u003e\nO LLMVoice agora traz o **Qwen3 (0.6B)**, o primeiro modelo de raciocĂ­nio da seleĂ§ĂŁo. Ele pode desenrolar uma fase de reflexĂŁo (`\u003cthink\u003e`) antes da resposta, e um botĂŁo permite exibir ou ocultar esse raciocĂ­nio. Ver um modelo de 0,6 bilhĂŁo de parĂ˘metros raciocinar em local em um telefone continua sendo a parte mais interessante do projeto.\n\u003c/Callout\u003e\n\nSejamos claros: tĂŁo comprimidos, esses modelos continuam limitados e alucinam com facilidade. O objetivo nĂŁo ĂŠ produĂ§ĂŁo, mas medir concretamente o que dĂĄ para rodar em um iPhone e atĂŠ onde aguenta. Meu velho iPhone 13 esquenta do mesmo jeito â mas um 0,6B que raciocina em local nĂŁo estava realmente em jogo quando a 1.0 saiu.\n\n\u003cYouTubeEmbed\n  videoId=\"RPD2vFscgCA\"\n  title=\"DemonstraĂ§ĂŁo em vĂ­deo do LLMVoice\"\n  caption=\"LLMVoice em aĂ§ĂŁo.\"\n  vertical\n/\u003e\n\n## Capturas de tela\n\n\u003cScreenshotGallery\n  images={[\n    {\n      src: \"/images/2025/llmvoice/screenshots/onboarding.webp\",\n      alt: \"Tela de configuraĂ§ĂŁo de modelos do LLMVoice\",\n      width: 800,\n      height: 1494,\n    },\n    {\n      src: \"/images/2025/llmvoice/screenshots/model-picker.webp\",\n      alt: \"SeleĂ§ĂŁo de modelo no LLMVoice\",\n      width: 800,\n      height: 1494,\n    },\n    {\n      src: \"/images/2025/llmvoice/screenshots/transcription-metrics.webp\",\n      alt: \"TranscriĂ§ĂŁo, resumo e mĂŠtricas de desempenho no LLMVoice\",\n      width: 800,\n      height: 1494,\n    },\n    {\n      src: \"/images/2025/llmvoice/screenshots/summary-generating.webp\",\n      alt: \"GeraĂ§ĂŁo de um resumo em andamento no LLMVoice, com progresso e mĂŠtricas\",\n      width: 800,\n      height: 1494,\n    },\n    {\n      src: \"/images/2025/llmvoice/screenshots/html-generation.webp\",\n      alt: \"GeraĂ§ĂŁo de cĂłdigo HTML com realce de sintaxe no LLMVoice\",\n      width: 800,\n      height: 1494,\n    },\n    {\n      src: \"/images/2025/llmvoice/screenshots/svg-code.webp\",\n      alt: \"GeraĂ§ĂŁo de cĂłdigo SVG no LLMVoice\",\n      width: 800,\n      height: 1494,\n    },\n    {\n      src: \"/images/2025/llmvoice/screenshots/svg-preview.webp\",\n      alt: \"PrĂŠ-visualizaĂ§ĂŁo renderizada de um SVG gerado pelo LLMVoice\",\n      width: 800,\n      height: 1494,\n    },\n    {\n      src: \"/images/2025/llmvoice/screenshots/prompt-template.webp\",\n      alt: \"Modelo de prompt e parĂ˘metros de geraĂ§ĂŁo no LLMVoice\",\n      width: 800,\n      height: 1494,\n    },\n    {\n      src: \"/images/2025/llmvoice/screenshots/settings.webp\",\n      alt: \"ConfiguraĂ§Ăľes e gestĂŁo de modelos do LLMVoice\",\n      width: 800,\n      height: 1494,\n    },\n  ]}\n  caption=\"Capturas do LLMVoice (interface em inglĂŞs).\"\n/\u003e\n\n## O reconhecimento de voz (iOS 26)\n\nA transcriĂ§ĂŁo se apoia em **SpeechAnalyzer** e **SpeechTranscriber**, as APIs introduzidas com o iOS 26. Elas rodam on-device e alimentam diretamente o resto do pipeline: a transcriĂ§ĂŁo vira a matĂŠria de um resumo ou o contexto de um prompt.\n\n## Modelos disponĂ­veis\n\nAlĂŠm do Apple Intelligence (modelo do sistema, iPhone 15 Pro e posteriores), cinco modelos MLX open-weight podem ser baixados sob demanda:\n\n| Modelo | ID do Hugging Face | Tamanho | Contexto | Idiomas |\n|---|---|---|---|---|\n| Gemma 3 (1B) | `mlx-community/gemma-3-1b-it-4bit` | ~300 MB | 32k | 140+ |\n| Gemma 3 QAT (1B) | `mlx-community/gemma-3-1b-it-qat-4bit` | ~733 MB | 32k | 140+ |\n| Qwen2.5 (0.5B) | `lmstudio-community/Qwen2.5-0.5B-Instruct-MLX-4bit` | ~150 MB | 32k | 29+ |\n| Qwen3 (0.6B) â raciocĂ­nio | `mlx-community/Qwen3-0.6B-4bit` | ~335 MB | 40k | 100+ |\n| Llama 3.2 (1B) | `mlx-community/Llama-3.2-1B-Instruct-4bit` | ~500 MB | 128k | 8 |\n\nO Qwen3 ĂŠ o Ăşnico com um modo de raciocĂ­nio. Para o resumo esse modo ĂŠ desativado, mantendo saĂ­das curtas; para um prompt direto, o modelo pode desenrolar seu raciocĂ­nio, que vocĂŞ exibe ou oculta na hora.\n\n## Medir o desempenho\n\nUm painel de mĂŠtricas em tempo real acompanha cada geraĂ§ĂŁo: vazĂŁo atual, mĂŠdia e de pico (tokens/s), nĂşmero de tokens, tempo total, tempo atĂŠ o primeiro token (TTFT), latĂŞncia mĂŠdia e uma estimativa de progresso. Ă isso que torna a demo realmente Ăştil: comparar modelos no mesmo dispositivo, nas mesmas condiĂ§Ăľes.\n\n## CĂłdigo e HTML\n\nQuando um modelo gera cĂłdigo, o LLMVoice aplica realce de sintaxe (HTML, CSS, JavaScript/TypeScript) e oferece uma prĂŠ-visualizaĂ§ĂŁo renderizada do HTML gerado, dentro do prĂłprio app.\n\n## CĂłdigo-fonte\n\n\u003cGitHubLink href=\"https://github.com/AndreFrelicot/llmvoice\" label=\"CĂłdigo-fonte LLMVoice\" /\u003e\n\n## Requisitos do sistema\n\niOS 26.0+ / iPadOS 26.0+\n\n**Para Apple Intelligence**\n\n- iPhone 15 Pro ou modelo posterior;\n- Apple Intelligence ativada nas configuraĂ§Ăľes.\n\n**Para os modelos locais MLX**\n\n- iPhone 12 ou modelo posterior (chip A14 Bionic ou superior);\n- iPad Pro 2021 ou posterior, iPad Air 5ÂŞ geraĂ§ĂŁo ou posterior (chip M1 ou superior);\n- GPU Metal com os recursos necessĂĄrios: `air.simd_sum`, suporte ao kernel `rmsfloat16`.\n\n## Armazenamento\n\nTamanho do app: cerca de 50 MB. Os modelos MLX sĂŁo baixados sob demanda, de ~150 MB (Qwen2.5) a ~733 MB (Gemma 3 QAT) â ver a tabela acima.\n\n\u003cbr/\u003e\n\u003cAppStoreLink href=\"https://apps.apple.com/us/app/llmvoice/id6753925010\" /\u003e\n\n---\n## đ Suporte\nPrecisa de ajuda ou quer enviar feedback? Escreva para [support@andrefrelicot.dev](mailto:support@andrefrelicot.dev).\n"])</script><script>self.__next_f.push([1,"2a:T15cd,"])</script><script>self.__next_f.push([1,"\n\u003cThemeImage\n  lightSrc=\"/images/2025/ble-uscope.webp\"\n  darkSrc=\"/images/2025/ble-uscope.webp\"\n  alt=\"BLE UScope no iPhone\"\n  width={800}\n  height={600}\n  priority={true}\n/\u003e\n\n# **BLE UScope â Scanner e Analisador AvanĂ§ado de Bluetooth Low Energy**\n\nBLE UScope ĂŠ uma ferramenta de anĂĄlise Bluetooth Low Energy para iOS, iPadOS, Android e macOS Catalyst. O app permite escanear perifĂŠricos prĂłximos, ler seus dados de anĂşncio, acompanhar o RSSI e conectar-se para explorar sua estrutura GATT.\n\nO objetivo ĂŠ tornar mais diretas as operaĂ§Ăľes comuns em torno do BLE: inspecionar serviĂ§os e caracterĂ­sticas, ler ou escrever valores, ativar notificaĂ§Ăľes, acompanhar eventos de conexĂŁo, registrar sessĂľes de monitoramento e exportar traces utilizĂĄveis.\n\n## DemonstraĂ§Ăľes\n\n\u003cYouTubeEmbed\n  videoId=\"n_EJOZfy4vo\"\n  title=\"DemonstraĂ§ĂŁo do BLE UScope\"\n  caption=\"DemonstraĂ§ĂŁo nĂŁo listada do BLE UScope durante o escaneamento e a exploraĂ§ĂŁo de dispositivos.\"\n/\u003e\n\n\u003cYouTubeEmbed\n  videoId=\"XsccrDK7ITg\"\n  title=\"DemonstraĂ§ĂŁo complementar do BLE UScope\"\n  caption=\"Segunda demonstraĂ§ĂŁo nĂŁo listada do BLE UScope, focada na anĂĄlise de um dispositivo conectado.\"\n/\u003e\n\n## Do escaneamento ao GATT\n\nA primeira tela serve para observar o ambiente BLE em tempo real. O BLE UScope mostra os dispositivos detectados com RSSI, dados de anĂşncio, serviĂ§os anunciados quando disponĂ­veis e uma categoria estimada a partir dos UUIDs, dos dados do fabricante ou do nome do dispositivo.\n\nDepois da conexĂŁo, o app passa para uma visualizaĂ§ĂŁo de detalhe mais voltada ao diagnĂłstico. Ă possĂ­vel navegar por serviĂ§os, caracterĂ­sticas e descritores, filtrar caracterĂ­sticas legĂ­veis, gravĂĄveis ou notificĂĄveis, e inspecionar valores em hexadecimal, UTF-8 ou decimal conforme o caso. As propriedades GATT permanecem visĂ­veis, evitando adivinhar se uma caracterĂ­stica suporta `read`, `write`, `notify` ou `indicate`.\n\nEssa parte fica propositalmente prĂłxima do vocabulĂĄrio BLE. Ao inspecionar um perifĂŠrico, ĂŠ importante ver UUIDs, valores brutos, descritores e estado de notificaĂ§ĂŁo sem que a interface esconda demais a realidade do protocolo.\n\n## Capturas\n\n\u003cScreenshotGallery\n  images={[\n    {\n      src: \"/images/2025/ble-uscope/ble-uscope-ios.webp\",\n      alt: \"BLE UScope no iPhone com detalhe de um dispositivo BLE\",\n      width: 720,\n      height: 1485,\n    },\n    {\n      src: \"/images/2025/ble-uscope/ble-uscope-android.webp\",\n      alt: \"BLE UScope no Android escaneando dispositivos BLE\",\n      width: 720,\n      height: 1516,\n    },\n    {\n      src: \"/images/2025/ble-uscope/ble-uscope-ipad.webp\",\n      alt: \"BLE UScope no iPad com navegaĂ§ĂŁo em mĂşltiplas colunas\",\n      width: 1400,\n      height: 1011,\n    },\n    {\n      src: \"/images/2025/ble-uscope/ble-uscope-macos.webp\",\n      alt: \"BLE UScope no macOS Catalyst\",\n      width: 1400,\n      height: 925,\n    },\n  ]}\n  caption=\"Capturas do BLE UScope 1.0.1 no iPhone, Android, iPad e macOS Catalyst.\"\n/\u003e\n\n## Monitoramento, diagnĂłsticos e exportaĂ§Ăľes\n\nO escaneamento ĂŠ apenas uma parte do fluxo. O BLE UScope tambĂŠm permite acompanhar uma conexĂŁo ao longo do tempo: qualidade do sinal, duraĂ§ĂŁo da conexĂŁo, histĂłrico de RSSI, eventos de conexĂŁo e notificaĂ§Ăľes recebidas.\n\nAs notificaĂ§Ăľes BLE podem ser registradas em sessĂľes de monitoramento. Isso ĂŠ Ăştil quando uma caracterĂ­stica emite regularmente uma medida, um estado ou um evento de domĂ­nio. O app mantĂŠm os valores com timestamp, dispositivo, serviĂ§o, caracterĂ­stica e RSSI quando essa informaĂ§ĂŁo estĂĄ disponĂ­vel.\n\nOs diagnĂłsticos ajudam a validar um perifĂŠrico conectado: descoberta de serviĂ§os, estabilidade da conexĂŁo, leitura de caracterĂ­sticas e verificaĂ§Ăľes simples de resposta ou throughput. As exportaĂ§Ăľes permitem guardar o que foi observado: perfil do dispositivo, estrutura GATT, valores de caracterĂ­sticas, logs ou sessĂľes de notificaĂ§Ăľes.\n\n## ImplementaĂ§ĂŁo\n\nA versĂŁo Apple ĂŠ desenvolvida em SwiftUI com CoreBluetooth. Ela suporta iOS, iPadOS e macOS via Catalyst, com layouts adaptados ao tamanho da tela. A camada BLE gerencia escaneamento, mĂşltiplas conexĂľes, restauraĂ§ĂŁo do CoreBluetooth, reconexĂľes, exploraĂ§ĂŁo GATT e monitoramento de notificaĂ§Ăľes.\n\nA versĂŁo Android ĂŠ desenvolvida em Kotlin com Jetpack Compose. Ela usa `BluetoothGatt`, uma fila sequencial de operaĂ§Ăľes para evitar colisĂľes BLE, fluxos de estado para sincronizar a interface, Room para os dados locais e telas dedicadas a logs, favoritos, histĂłrico e diagnĂłsticos.\n\nAs duas versĂľes seguem a mesma intenĂ§ĂŁo de produto, mas respeitam as restriĂ§Ăľes de cada plataforma. No Android, isso significa lidar com permissĂľes Bluetooth modernas, limites de frequĂŞncia de scan e comportamentos variĂĄveis das stacks BLE conforme o aparelho. No iOS, CoreBluetooth impĂľe seu prĂłprio modelo de restauraĂ§ĂŁo, autorizaĂ§ĂŁo e ciclo de vida.\n\n## Dados e privacidade\n\nBLE UScope funciona localmente. NĂŁo hĂĄ conta, nĂŁo hĂĄ analytics e nenhum dado BLE ĂŠ enviado para um servidor. Favoritos, nomes personalizados, histĂłricos, logs e exportaĂ§Ăľes permanecem no dispositivo, salvo aĂ§ĂŁo explĂ­cita de compartilhamento ou exportaĂ§ĂŁo.\n\n## Download\n\nDisponĂ­vel na App Store e no Google Play.\n\n\u003cAppStoreLink href=\"https://apps.apple.com/us/app/ble-uscope/id6753627148\" /\u003e\n\u003cPlayStoreLink href=\"https://play.google.com/store/apps/details?id=dev.andrefrelicot.bleuscope\" /\u003e\n\n---\n\n## Suporte\n\nPrecisa de ajuda ou quer enviar feedback? Escreva para [support@andrefrelicot.dev](mailto:support@andrefrelicot.dev).\n"])</script><script>self.__next_f.push([1,"2b:Tcb0,"])</script><script>self.__next_f.push([1,"\n\u003cThemeImage\n  lightSrc=\"/images/2025/decibelpeak.webp\"\n  darkSrc=\"/images/2025/decibelpeak.webp\"\n  alt=\"DecibelPeak no iPhone\"\n  width={800}\n  height={600}\n  priority={true}\n/\u003e\n\n# NĂ­vel sonoro em tempo real com contexto visual\n\nDecibelPeak parte de uma ideia simples: abrir o app, permitir acesso ao microfone e ver imediatamente o nĂ­vel sonoro ao redor.\n\nA versĂŁo atual mantĂŠm essa leitura direta e adiciona mais contexto: medidor circular, onda, espectro, barras FFT, cĂ­rculo FFT, waterfall, curva dB e visualizaĂ§ĂŁo de pico dB. A intenĂ§ĂŁo nĂŁo ĂŠ substituir um sonĂ´metro certificado, mas oferecer uma ferramenta prĂĄtica para observar um ambiente acĂşstico, comparar duas situaĂ§Ăľes e manter uma referĂŞncia visual em tempo real.\n\n\u003cYouTubeEmbed\n  videoId=\"BJJYvYWmodY\"\n  title=\"DemonstraĂ§ĂŁo do DecibelPeak\"\n  caption=\"VĂ­deo de demonstraĂ§ĂŁo nĂŁo listado do DecibelPeak em uso.\"\n/\u003e\n\n## O que o app mostra\n\nA tela principal combina um valor instantĂ˘neo em dB, uma escala graduada e um indicador de zona sonora. Os nĂ­veis sĂŁo agrupados em faixas legĂ­veis, de silencioso a forte, para que o app nĂŁo mostre apenas um nĂşmero isolado.\n\nA ĂĄrea superior pode alternar entre vĂĄrias visualizaĂ§Ăľes de ĂĄudio. As vistas rĂĄpidas mostram a onda e o espectro, enquanto os modos FFT e waterfall oferecem uma leitura mais voltada para frequĂŞncias. A curva dB e o pico dB ajudam a entender a evoluĂ§ĂŁo ao longo do tempo: uma subida progressiva, um evento curto, a mĂŠdia da sessĂŁo ou o maior valor atingido.\n\nA calibraĂ§ĂŁo local permite ajustar o offset de mediĂ§ĂŁo em passos de 0,5 dB. Isso ajuda a aproximar o DecibelPeak de um dispositivo de referĂŞncia ou compensar diferenĂ§as entre microfones.\n\n## Capturas\n\n\u003cScreenshotGallery\n  images={[\n    {\n      src: \"/images/2025/decibelpeak/decibelpeak-pt-01.webp\",\n      alt: \"Tela principal do DecibelPeak com medidor circular e pico dB\",\n    },\n    {\n      src: \"/images/2025/decibelpeak/decibelpeak-pt-02.webp\",\n      alt: \"DecibelPeak em orientaĂ§ĂŁo paisagem com histĂłrico do pico dB\",\n    },\n  ]}\n  caption=\"Capturas de iPhone do DecibelPeak 1.2.\"\n/\u003e\n\n## ImplementaĂ§ĂŁo\n\nA versĂŁo iOS ĂŠ desenvolvida com SwiftUI, AVFoundation para captura de ĂĄudio e Accelerate para anĂĄlise de frequĂŞncia. A versĂŁo Android segue a mesma direĂ§ĂŁo de produto com Kotlin, Jetpack Compose e AudioRecord.\n\nO processamento acontece no dispositivo. O ĂĄudio ĂŠ analisado em tempo real para calcular o nĂ­vel sonoro, alimentar as visualizaĂ§Ăľes e atualizar o histĂłrico. O DecibelPeak nĂŁo foi criado para gravar conversas: ele trabalha com o sinal ao vivo e nĂŁo envia dados de ĂĄudio para um servidor.\n\n## CĂłdigo fonte\n\n\u003cGitHubLink href=\"https://github.com/AndreFrelicot/DecibelPeak\" label=\"CĂłdigo fonte iOS\" /\u003e\n\u003cGitHubLink href=\"https://github.com/AndreFrelicot/DecibelPeak-android\" label=\"CĂłdigo fonte Android\" /\u003e\n\n## Download\n\nDisponĂ­vel na App Store e Google Play.\n\u003cbr /\u003e\n\u003cAppStoreLink href=\"https://apps.apple.com/app/decibelpeak/id6752702602\" /\u003e\n\u003cPlayStoreLink href=\"https://play.google.com/store/apps/details?id=dev.andrefrelicot.decibelpeak\" /\u003e\n\n---\n\n## Suporte\n\nPrecisa de ajuda ou quer enviar feedback? Escreva para [support@andrefrelicot.dev](mailto:support@andrefrelicot.dev).\n"])</script><script>self.__next_f.push([1,"2c:T4cb,\n\u003cThemeImage\n  lightSrc=\"/images/2025/hello-world.webp\"\n  darkSrc=\"/images/2025/hello-world.webp\"\n  alt=\"Where everything is built\"\n  width={800}\n  height={600}\n  priority={true}\n/\u003e\n\n# Bem-vindo ao meu Devlog!  \n\nAqui vou compartilhar meu caminho e minhas exploraĂ§Ăľes em novas tecnologias, com o objetivo de criar e distribuir novos produtos.  \n\nEstou comeĂ§ando pelo desenvolvimento de aplicaĂ§Ăľes *showcase*, mĂłveis e web. As aplicaĂ§Ăľes comerciais virĂŁo nos prĂłximos meses.  \n\nMeus principais interesses sĂŁo:  \n- o **mobile**  \n- o **ĂĄudio** (DSP, VST/AU)  \n- a **mĂşsica** (MIDI, teoria)  \n- os **grĂĄficos** (3D, GPU, visualizaĂ§ĂŁo, shaders)  \n- a **VR/XR** (Meta Quest, Apple Vision)  \n- o **ciberespaĂ§o** em geral (redes sociais, viralidade, IoT, etc.)  \n- a **IA generativa**  \n- o **Web 3.0** (blockchain, cryptos). \n\n\nTambĂŠm me interesso pela c
