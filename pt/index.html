mages/2026/paper-shaders/paper-shaders-showcase-grid.jpg\"\n  darkSrc=\"/images/2026/paper-shaders/paper-shaders-showcase-grid.jpg\"\n  alt=\"Uma grade de renders do Paper Shaders gerados a partir dos presets padrĂŁo\"\n  width={1728}\n  height={1440}\n  priority={true}\n/\u003e\n\nPaper Shaders ĂŠ uma coleĂ§ĂŁo de fragment shaders WebGL projetada para produzir fundos visuais, texturas, padrĂľes de halftone, gradientes e efeitos generativos por meio de uma pequena API web.\n\nO projeto original, [paper-design/shaders](https://github.com/paper-design/shaders), ĂŠ publicado sob a licenĂ§a **Apache 2.0**.\n\nO projeto original ĂŠ web-first: GLSL, React, canvas, texturas, imagens e presets. Meu objetivo era diferente: manter o mesmo catĂĄlogo visual, mas tornĂĄ-lo utilizĂĄvel em aplicativos nativos SwiftUI e Flutter, com pacotes publicĂĄveis e apps de demonstraĂ§ĂŁo que expĂľem todos os parĂ˘metros.\n\nO resultado se divide em dois ports:\n\n- **PaperShaders** para Swift/Metal, com um nĂşcleo MetalKit e uma camada SwiftUI.\n- **paper_shaders** para Flutter, com runtime shaders do Flutter e uma API Dart tipada.\n\nNĂŁo ĂŠ apenas um exercĂ­cio de traduĂ§ĂŁo sintĂĄtica. Um shader que compila nĂŁo ĂŠ necessariamente um shader que produz a mesma imagem. O verdadeiro trabalho foi construir um contrato compartilhado entre trĂŞs runtimes: WebGL, Metal e Flutter.\n\n## O contrato compartilhado\n\nA parte mais importante do port nĂŁo ĂŠ a funĂ§ĂŁo de shader mais exĂłtica. Ă o contrato em volta do shader.\n\nCada efeito precisa receber as mesmas famĂ­lias de parĂ˘metros:\n\n- um espaĂ§o de coordenadas estĂĄvel;\n- modos de sizing como `cover`, `contain` e `none`;\n- escala, rotaĂ§ĂŁo, origem e offsets;\n- um `frame` determinĂ­stico;\n- uma velocidade;\n- cores, imagens ou texturas de ruĂ­do, conforme o shader;\n- presets nomeados.\n\nEsse contrato ĂŠ o que torna os ports comparĂĄveis. Se `simplex-noise` ou `spiral` nĂŁo recebem o mesmo espaĂ§o UV, a mesma origem e a mesma noĂ§ĂŁo de tempo, a discussĂŁo sobre a fidelidade do shader comeĂ§a tarde demais: os sistemas jĂĄ sĂŁo diferentes.\n\nNa web, parte dessa lĂłgica vive naturalmente no canvas, no vertex shader e no ambiente WebGL. Em Swift/Metal e Flutter, essa responsabilidade precisa ser posicionada deliberadamente. A abordagem escolhida ĂŠ explĂ­cita: o sizing e os uniforms fazem parte da API pĂşblica, e os presets expĂľem o mesmo modelo mental em todas as plataformas.\n\n```swift\nSimplexNoiseView(\n  params: .init(\n    colors: [\"#FF7B00\", \"#F9FFEB\", \"#330D82\"],\n    stepsPerColor: 2,\n    softness: 0.12,\n    sizing: ShaderSizingParams(fit: .cover, scale: 1)\n  )\n)\n```\n\n```dart\nconst SimplexNoiseView(\n  params: SimplexNoiseParams(\n    colors: ['#FF7B00', '#F9FFEB', '#330D82'],\n    stepsPerColor: 2,\n    softness: 0.12,\n    sizing: ShaderSizing(fit: ShaderFit.cover, scale: 1),\n  ),\n)\n```\n\nAs cores sĂŁo simples strings hexadecimais em todas as plataformas, exatamente como na API React original: as mesmas trĂŞs strings produzem o mesmo render em React, SwiftUI e Flutter, sem nenhuma conversĂŁo de cor especĂ­fica de plataforma para dar errado.\n\nO cĂłdigo de inicializaĂ§ĂŁo importa. Um preset visual nĂŁo ĂŠ sĂł um JSON de valores: em um app real, vocĂŞ quer copiar um snippet Swift ou Dart, colar no projeto e obter o mesmo render.\n\n## TrĂŞs linguagens, nĂŁo trĂŞs aparĂŞncias\n\nA implementaĂ§ĂŁo WebGL original usa GLSL. O port Swift usa Metal Shading Language. O Flutter tambĂŠm aceita GLSL como entrada, mas dentro das restriĂ§Ăľes dos runtime shaders do Flutter, compilados pela toolchain Flutter/Impeller.\n\nNo papel, as linguagens se parecem o bastante para dar uma falsa impressĂŁo de simplicidade. Na prĂĄtica, os detalhes importam:\n\n| Tema | WebGL / GLSL | Metal / MSL | Runtime shader do Flutter |\n|---|---|---|---|\n| Coordenadas de fragmento | `gl_FragCoord` | coordenadas passadas ao fragmento | `FlutterFragCoord()` |\n| MĂłdulo em ponto flutuante | `mod` | `fmod` + helpers | `mod` GLSL |\n| Ăngulos | `atan(y, x)` | `atan2(y, x)` | `atan(y, x)` |\n| Uniforms booleanos | aceitos | tipos Metal | muitas vezes codificados como floats |\n| Arrays de uniforms | `vec4 colors[10]` | buffers tipados | offsets estritos no Dart |\n| Texturas | samplers WebGL | texturas Metal | samplers do Flutter, sem todo o ecossistema WebGL |\n\nO difĂ­cil nĂŁo ĂŠ encontrar a funĂ§ĂŁo equivalente. Ă preservar as convenĂ§Ăľes implĂ­citas: orientaĂ§ĂŁo, pixel ratio, interpolaĂ§ĂŁo, precisĂŁo, ordem dos uniforms, samplers e comportamento nas bordas.\n\nO port Flutter tem uma vantagem: boa parte do GLSL original continua reutilizĂĄvel. Mas ele tambĂŠm impĂľe uma restriĂ§ĂŁo rĂ­gida: cada uniform tem uma posiĂ§ĂŁo exata no buffer que o Flutter espera. Um offset errado nem sempre quebra a compilaĂ§ĂŁo; ele pode transformar uma cor em escala, um booleano em limiar ou um offset em velocidade.\n\nO port Metal ĂŠ mais explĂ­cito. VocĂŞ ganha tipos e integraĂ§ĂŁo nativa, mas paga a traduĂ§ĂŁo de GLSL para MSL shader por shader.\n\n## O catĂĄlogo em seis famĂ­lias\n\nEm vez de um passeio shader por shader, aqui estĂĄ o catĂĄlogo inteiro agrupado por famĂ­lia visual. Cada imagem abaixo ĂŠ um render golden da suĂ­te de paridade: o preset padrĂŁo de cada shader, exatamente como os testes o veem.\n\n**Gradientes** â `mesh-gradient`, `static-mesh-gradient`, `static-radial-gradient`, `grain-gradient`: campos de cor suaves, do mesh de cores animado Ă  rampa radial, mais uma versĂŁo texturizada com grĂŁo de filme.\n\nMatematicamente, um mesh gradient nĂŁo ĂŠ um gradiente, e sim uma interpolaĂ§ĂŁo de Shepard: cada pixel faz a mĂŠdia dos pontos de cor ponderada pelo inverso da distĂ˘ncia, `w = 1/(d^3.5 + eps)`, enquanto os pontos derivam por trajetĂłrias em `sin`/`cos`. Nada ĂŠ desenhado: a suavidade ĂŠ a prĂłpria mĂŠdia. `static-radial-gradient` ĂŠ o mais analĂ­tico da famĂ­lia: ele resolve uma interseĂ§ĂŁo raio-cĂ­rculo (uma equaĂ§ĂŁo quadrĂĄtica por pixel) para produzir um decaimento radial descentrado, e `grain-gradient` quantiza um campo de forma em uma rampa de cores antes de texturizĂĄ-lo com grĂŁo simplex.\n\n\u003cZoomableThemeImage\n  src=\"/images/2026/paper-shaders/families/family-gradients.webp\"\n  alt=\"Gradientes â mesh-gradient, static-mesh-gradient, static-radial-gradient, grain-gradient\"\n  width={1568}\n  height={392}\n/\u003e\n\n**RuĂ­do orgĂ˘nico** â `simplex-noise`, `perlin-noise`, `neuro-noise`, `smoke-ring`, `gem-smoke`, `warp`: o ruĂ­do contĂ­nuo posto para trabalhar â contornos em faixas, campos salpicados, filamentos brilhantes, fumaĂ§a e distorĂ§ĂŁo marmorizada.\n\nTrĂŞs tipos de \"ruĂ­do\" convivem aqui. Simplex verdadeiro (a clĂĄssica implementaĂ§ĂŁo Ashima, duas oitavas rolando em sentidos opostos), Perlin 3D verdadeiro (gradientes nos cantos, interpolaĂ§ĂŁo quĂ­ntica `t^3(t(6t-15)+10)`) empilhado como fbm â *fractional Brownian motion*, o mesmo ruĂ­do somado de novo com frequĂŞncia crescente e amplitude decrescente, aqui atĂŠ 8 oitavas â e falso: `neuro-noise` nĂŁo ĂŠ ruĂ­do de forma alguma, mas um laĂ§o de 15 iteraĂ§Ăľes que gira o referencial em um radiano por passo e acumula `sin`/`cos`; o padrĂŁo de interferĂŞncia desenha os filamentos. A outra grande ideia da famĂ­lia ĂŠ o domain warping: `warp` deforma as prĂłprias coordenadas (`uv.x += s/i * cos(t + 1.5*i*uv.y)`, atĂŠ 20 iteraĂ§Ăľes) antes de desenhar listras simples, e `smoke-ring` calcula seu fbm em coordenadas polares para ondular o raio de um anel. RuĂ­do usado como valor dĂĄ nuvens; usado como deslocamento, dĂĄ mĂĄrmore.\n\n\u003cZoomableThemeImage\n  src=\"/images/2026/paper-shaders/families/family-noise.webp\"\n  alt=\"RuĂ­do orgĂ˘nico â simplex-noise, perlin-noise, neuro-noise, smoke-ring, gem-smoke, warp\"\n  width={1176}\n  height={784}\n/\u003e\n\n**Efeitos polares** â `spiral`, `swirl`, `god-rays`: territĂłrio puro do par `(Ă˘ngulo, raio)` â espirais concĂŞntricas, faixas de cor torcidas e raios que se abrem a partir de um ponto.\n\nA famĂ­lia inteira cabe em uma fĂłrmula: `fract(a*angle + b*f(radius))` depois da transformaĂ§ĂŁo polar. `spiral` usa `f(r) = pow(r, density)` â a densidade aperta os braĂ§os; `swirl` usa uma potĂŞncia negativa, `pow(r, -twist)`, que torce N faixas angulares em um catavento; `god-rays` substitui o termo radial por value noise amostrado ao longo do Ă˘ngulo â ruĂ­do no Ă˘ngulo vira raios. O centro ĂŠ o ponto sensĂ­vel: quando o raio tende a zero, o Ă˘ngulo fica instĂĄvel, e a descontinuidade do `atan` em ÂąĎ precisa ser escondida (`god-rays` mistura duas variantes de ruĂ­do dos dois lados da emenda).\n\n\u003cZoomableThemeImage\n  src=\"/images/2026/paper-shaders/families/family-polar.webp\"\n  alt=\"Efeitos polares â spiral, swirl, god-rays\"\n  width={1176}\n  height={392}\n/\u003e\n\n**PadrĂľes e geometria** â `dot-grid`, `dot-orbit`, `voronoi`, `metaballs`, `color-panels`, `waves`, `pulsing-border`: repetiĂ§ĂŁo e cĂŠlulas â grades de pontos, partĂ­culas em Ăłrbita, mosaicos de Voronoi, metaballs que se fundem, painĂŠis translĂşcidos empilhados, ondas em zigue-zague e uma borda luminosa.\n\nAqui o espaĂ§o ĂŠ particionado antes de desenhar qualquer coisa: `floor`/`fract` cortam o plano em cĂŠlulas (`dot-grid`), um laĂ§o de Voronoi 3Ă3 encontra o centro de cĂŠlula mais prĂłximo (`dot-orbit`), e `voronoi` faz uma segunda passada com a mĂŠtrica de borda de Inigo Quilez â a distĂ˘ncia Ă  bissetriz entre cĂŠlulas vizinhas â para obter bordas limpas. Cada cĂŠlula recebe um hash que varia tamanho, opacidade ou cor: repetiĂ§ĂŁo sem uniformidade. `metaballs` ĂŠ um campo escalar â uma soma de decaimentos `pow(1 - d/2, p)`, um por bola â cortado por um limiar em 0.4: as formas se fundem porque os campos se somam antes do limiar. E `color-panels` esconde uma projeĂ§ĂŁo em perspectiva de verdade, `z = y/(sin(a) - y*cos(a))`, dentro de um fragment shader 2D.\n\n\u003cZoomableThemeImage\n  src=\"/images/2026/paper-shaders/families/family-patterns.webp\"\n  alt=\"PadrĂľes e geometria â dot-grid, dot-orbit, voronoi, metaballs, color-panels, waves, pulsing-border\"\n  width={1568}\n  height={784}\n/\u003e\n\n**Halftone e dithering** â `halftone-dots`, `halftone-cmyk`, `dithering`, `image-dithering`, `heatmap`: a famĂ­lia da quantizaĂ§ĂŁo â uma entrada contĂ­nua, procedural ou uma imagem do usuĂĄrio, forĂ§ada a pontos, separaĂ§Ăľes CMYK, tramas de dithering ou nĂ­veis de calor.\n\nĂ quantizaĂ§ĂŁo contra um limiar estruturado no espaĂ§o. `halftone-dots` transforma a luminĂ˘ncia (pesos Rec. 709: `0.2126*R + 0.7152*G + 0.0722*B`) no raio de um ponto sobre uma grade; `halftone-cmyk` separa a imagem em tintas (`K = 1 - max(R, G, B)`) e reticula cada canal no seu prĂłprio Ă˘ngulo â 15Â°, 75Â°, 0Â°, 45Â°, os Ă˘ngulos de retĂ­cula reais da indĂşstria grĂĄfica, de onde vĂŞm as rosetas. Os dois shaders de dithering comparam o sinal com matrizes de Bayer 2Ă2, 4Ă4 e 8Ă8 embutidas como constantes â `step(0.5, value + threshold - 0.5)`, um bit por pixel. `heatmap` fecha a famĂ­lia: um escalar de calor percorre uma rampa de cores com mĂşltiplas paradas â a tabela de consulta (LUT) das cĂ˘meras tĂŠrmicas. Em todos os casos, ĂŠ o olho que faz a integraĂ§ĂŁo: o tamanho ou a densidade dos pontos volta a ser lido como tom.\n\n\u003cZoomableThemeImage\n  src=\"/images/2026/paper-shaders/families/family-halftone.webp\"\n  alt=\"Halftone e dithering â halftone-dots, halftone-cmyk, dithering, image-dithering, heatmap\"\n  width={1176}\n  height={784}\n/\u003e\n\n**Materiais** â `paper-texture`, `fluted-glass`, `liquid-metal`, `water`: superfĂ­cies simuladas, geralmente aplicadas sobre uma imagem do usuĂĄrio â papel, vidro canelado, cromo lĂ­quido e ĂĄgua.\n\nNenhuma Ăłptica real aqui â apenas deslocamento de UV e iluminaĂ§ĂŁo simulada. `fluted-glass` refrata deslocando lateralmente o ponto onde a imagem ĂŠ amostrada, seguindo um perfil periĂłdico por caneladura (cĂşbico, quadrĂĄtico ou senoidal); `water` sobrepĂľe um simplex de baixa frequĂŞncia (as ondas) e um acumulador de cĂĄusticas de 6 iteraĂ§Ăľes, ambos deslocando o UV, e o quadrado da cĂĄustica vira o brilho; `paper-texture` empilha ruĂ­dos (as fibras como a magnitude do gradiente de um fbm, as dobras como distĂ˘ncias a pontos aleatĂłrios, as gotas como cĂŠlulas de Worley), deriva uma normal por diferenĂ§as finitas e a ilumina com um simples produto escalar lambertiano; `liquid-metal` fabrica seu cromo com uma rampa de faixas em `fract()` cujos canais vermelho e azul estĂŁo defasados â a dispersĂŁo cromĂĄtica reduzida a uma subtraĂ§ĂŁo. A pergunta que cada pixel responde nunca ĂŠ \"para onde vai a luz\", e sim \"qual pixel da imagem eu leio, e com qual brilho\".\n\n\u003cZoomableThemeImage\n  src=\"/images/2026/paper-shaders/families/family-materials.webp\"\n  alt=\"Materiais â paper-texture, fluted-glass, liquid-metal, water\"\n  width={1568}\n  height={392}\n/\u003e\n\n## A pequena matemĂĄtica por trĂĄs da portabilidade\n\nEm vez de repassar os shaders um a um, o Ă˘ngulo mais Ăştil ĂŠ o pequeno conjunto de famĂ­lias matemĂĄticas que movem os seis grupos acima e explicam por que o mesmo efeito pode continuar portĂĄvel.\n\n### 1. O espaĂ§o UV\n\nA maioria dos shaders comeĂ§a transformando o pixel atual em coordenadas normalizadas.\n\n```glsl\nvec2 uv = fragCoord / resolution;\nvec2 p = uv - 0.5;\n```\n\nA partir daĂ­, o shader pode mover a origem, aplicar escala, girar a base e passar essas coordenadas para uma funĂ§ĂŁo visual. Essa ĂŠ a base.\n\nA rotaĂ§ĂŁo, por exemplo, nĂŁo ĂŠ mĂĄgica misteriosa de shader: ĂŠ uma matriz 2D.\n\n```glsl\nmat2 rotate(float a) {\n  float c = cos(a);\n  float s = sin(a);\n  return mat2(c, -s, s, c);\n}\n```\n\nSe essa transformaĂ§ĂŁo nĂŁo for idĂŞntica entre as plataformas, o shader pode estar perfeitamente traduzido e ainda assim produzir uma imagem deslocada, invertida ou esticada.\n\n### 2. Coordenadas polares\n\nEfeitos como `spiral`, `swirl`, os gradientes radiais e vĂĄrias distorĂ§Ăľes dependem de converter `(x, y)` em `(Ă˘ngulo, raio)`.\n\n```glsl\nfloat angle = atan(p.y, p.x);\nfloat radius = length(p);\nfloat bands = sin(angle + radius * frequency);\n```\n\nĂ uma transformaĂ§ĂŁo compacta, mas sensĂ­vel. Perto do centro, o raio tende a zero; o Ă˘ngulo fica instĂĄvel; pequenas diferenĂ§as de precisĂŁo ou de anti-aliasing se tornam visĂ­veis. Ă exatamente o tipo de shader em que um port pode parecer correto Ă  primeira vista e depois revelar um padrĂŁo em cruz, uma borda serrilhada ou uma oscilaĂ§ĂŁo estranha em um backend especĂ­fico.\n\n### 3. O ruĂ­do\n\nAs texturas de papel, o grĂŁo, a fumaĂ§a e os degradĂŞs orgĂ˘nicos usam o ruĂ­do como uma fonte controlada de variaĂ§ĂŁo.\n\nO ruĂ­do nĂŁo estĂĄ ali sĂł para sujar a imagem. Ele quebra a perfeiĂ§ĂŁo numĂŠrica. Uma superfĂ­cie regular demais parece artificial; um pouco de ruĂ­do a aproxima do papel, da tinta ou do material.\n\nNeste port, o ruĂ­do tambĂŠm ĂŠ uma restriĂ§ĂŁo prĂĄtica: alguns shaders usam uma textura de ruĂ­do embutida. O mesmo PNG precisa ser carregado com as mesmas convenĂ§Ăľes de amostragem, ou o render deriva. Uma textura de 128Ă128 repetida, filtrada ou amostrada de forma diferente pode bastar para mudar o carĂĄter de um shader.\n\n### 4. A quantizaĂ§ĂŁo\n\nAs famĂ­lias `halftone`, `dithering` e heatmap fazem o oposto do ruĂ­do contĂ­nuo: forĂ§am o render a nĂ­veis discretos.\n\n```glsl\nfloat stepped = floor(value * steps) / steps;\n```\n\nA operaĂ§ĂŁo ĂŠ deliberadamente brusca. Uma imagem vira uma trama, uma cor vira um nĂ­vel e um degradĂŞ vira uma sĂŠrie de faixas. Ă tambĂŠm o tipo de efeito que expĂľe imediatamente as diferenĂ§as de arredondamento entre plataformas.\n\n### 5. As derivadas de GPU\n\nA parte mais sutil do port foi provavelmente o anti-aliasing baseado em derivadas.\n\nEm GLSL, `fwidth(x)` estima o quanto `x` muda entre pixels vizinhos. Ă muito Ăştil para suavizar uma borda:\n\n```glsl\nfloat edge = smoothstep(threshold - fwidth(v), threshold + fwidth(v), v);\n```\n\nMas `fwidth` estĂĄ amarrada Ă  execuĂ§ĂŁo na GPU. Ela depende de como o backend agrupa os fragmentos e calcula as derivadas. Para renderizaĂ§ĂŁo interativa, geralmente ĂŠ o que vocĂŞ quer. Para paridade com imagens golden, ĂŠ mais complicado: duas plataformas podem estar visualmente muito prĂłximas e ainda assim produzir pixels ligeiramente diferentes nas bordas.\n\nO compromisso para os testes foi substituir alguns usos por uma derivada determinĂ­stica controlada quando a paridade exigia. O Flutter tomou parte dessa decisĂŁo por mim: seu runner de testes rejeita `fwidth(float)` de cara, junto com a indexaĂ§ĂŁo dinĂ˘mica de arrays de uniforms. NĂŁo ĂŠ uma reescrita artĂ­stica do shader. Ă uma forma de separar o comportamento em teste do detalhe de implementaĂ§ĂŁo local da GPU.\n\n## Testando shaders com imagens golden\n\nO `frame` determinĂ­stico muda tudo. Se um shader depende apenas dos seus uniforms, das suas texturas e de um nĂşmero de frame, ele pode ser renderizado fora da tela e comparado com um PNG de referĂŞncia.\n\nO fluxo de trabalho ĂŠ assim:\n\n```text\nfonte GLSL -\u003e manifest -\u003e port Swift/Metal\n                   \\-\u003e port Flutter\n\nPNG golden web -\u003e renderer nativo -\u003e comparaĂ§ĂŁo perceptual\n```\n\nCada preset vira um caso de teste visual â 120 renders golden em todo o catĂĄlogo. NĂŁo ĂŠ perfeito: comparar imagens nĂŁo prova que um shader ĂŠ matematicamente idĂŞntico. Mas pega os erros que realmente importam nesse tipo de pacote:\n\n- ordem errada dos uniforms;\n- cor invertida;\n- rotaĂ§ĂŁo ou origem incorreta;\n- textura ausente;\n- erro de amostragem;\n- deriva de anti-aliasing;\n- frame ou velocidade nĂŁo determinĂ­sticos.\n\nPara uma biblioteca de shaders, a imagem ĂŠ o contrato.\n\n## O custo em desempenho do modo preciso\n\nAs primeiras execuĂ§Ăľes em tela cheia do port Metal em dispositivos reais foram uma liĂ§ĂŁo de humildade: shaders perfeitamente fluidos em uma aba do navegador perdiam frames como views nativas. A GPU nĂŁo era o problema. Minha configuraĂ§ĂŁo de paridade, sim.\n\nPara manter os renders golden alinhados com o WebGL, o pipeline Metal compila com safe math e funĂ§Ăľes de ponto flutuante precisas. O fast math permite ao compilador contrair e reassociar operaĂ§Ăľes de ponto flutuante e substituir `sin`/`cos` por aproximaĂ§Ăľes â o suficiente para descorrelacionar da referĂŞncia o ruĂ­do baseado em hash; as oitavas do `perlin-noise` derivam visivelmente. O modo preciso ĂŠ, portanto, exatamente o que os testes de paridade precisam. Mas ele tambĂŠm ĂŠ bem mais lento em shaders como `neuro-noise`, que acumulam muita trigonometria por pixel â e uma view Retina em tela cheia empurra muito mais pixels que um canvas tĂ­pico de navegador.\n\nO pacote agora trata paridade e interatividade como dois modos de renderizaĂ§ĂŁo distintos:\n\n```swift\n// Paridade golden: funĂ§Ăľes de ponto flutuante precisas, resoluĂ§ĂŁo fixa.\nShaderRenderOptions.fixed\n\n// Interativo: fast math, mais uma resoluĂ§ĂŁo interna que\n// se adapta atĂŠ sustentar a taxa de frames alvo.\nShaderRenderOptions.adaptive(targetFrameRate: 60)\n```\n\nO fast math ĂŠ a maior alavanca; o nĂşmero de pixels ĂŠ a outra. O orĂ§amento de pixels espelha o do projeto original: um pixel ratio mĂ­nimo e um teto de pixels renderizados no total. Em cima disso, o modo adaptativo roda um pequeno laĂ§o de retroalimentaĂ§ĂŁo: as duraĂ§Ăľes de frame sĂŁo suavizadas com uma mĂŠdia mĂłvel exponencial; quando o valor suavizado ultrapassa o alvo em mais de cerca de 12%, a resoluĂ§ĂŁo interna desce um degrau; assim que volta a haver folga confortĂĄvel, ela sobe devagar, sem nunca cair abaixo de um piso configurĂĄvel. Shaders limitados pelo fragment shader escalam quase linearmente com o nĂşmero de pixels: uma pequena queda de resoluĂ§ĂŁo â geralmente invisĂ­vel em um fundo animado â recupera a taxa de frames.\n\nCada view tambĂŠm pode reportar mĂŠtricas de render ao vivo (frames por segundo, tamanho do drawable, pixel ratio efetivo, escala adaptativa, modo matemĂĄtico), que o app de demonstraĂ§ĂŁo exibe como overlay. E para manter a comparaĂ§ĂŁo honesta, o workbench ganhou uma pĂĄgina web independente em tela cheia que roda os shaders WebGL originais nos mesmos dispositivos e reporta FPS, tamanho do canvas e device pixel ratio. Mesmo shader, mesmo preset, mesma tela: a Ăşnica forma de saber se o port nativo ĂŠ realmente mais lento ou se estĂĄ apenas renderizando mais pixels.\n\n## Apps de demonstraĂ§ĂŁo\n\nOs pacotes nĂŁo sĂŁo sustentados apenas por arquivos README. Cada port tem um app showcase.\n\nOs apps SwiftUI e Flutter permitem navegar por todos os shaders, trocar de preset, editar os uniforms, testar sliders, cores e sizing, e copiar o cĂłdigo de inicializaĂ§ĂŁo.\n\nEsse Ăşltimo detalhe ĂŠ intencional. Um showcase que exibe um render ĂŠ Ăştil; um showcase que te dĂĄ o cĂłdigo exato para reproduzi-lo ĂŠ muito mais Ăştil.\n\nAs listas de shaders usam miniaturas estĂĄticas geradas a partir dos presets padrĂŁo. Escolhi assets prĂŠ-renderizados em vez de renderizar ao vivo cada cĂŠlula: ĂŠ mais estĂĄvel, mais rĂĄpido e suficiente para navegar. A animaĂ§ĂŁo fica reservada Ă  view do shader ativo.\n\n## Os pacotes\n\nOs dois ports estĂŁo publicados como pacotes open source, cada um com CI no GitHub Actions, checagens de paridade golden e um app de demonstraĂ§ĂŁo:\n\n- **paper_shaders** para Flutter estĂĄ disponĂ­vel no [pub.dev](https://pub.dev/packages/paper_shaders);\n- **PaperShaders** para Swift se instala como dependĂŞncia SwiftPM a partir das releases com tag no GitHub.\n\n\u003cdiv className=\"not-prose flex flex-col gap-3 sm:flex-row sm:items-center\"\u003e\n  \u003cGitHubLink href=\"https://github.com/AndreFrelicot/paper-shaders-swift\" label=\"PaperShaders Swift/Metal\" /\u003e\n  \u003cGitHubLink href=\"https://github.com/AndreFrelicot/paper-shaders-flutter\" label=\"paper_shaders Flutter\" /\u003e\n\u003c/div\u003e\n\n## O que eu levo disso\n\nPortar um shader nĂŁo ĂŠ sĂł traduzir sintaxe. Ă um problema de conservaĂ§ĂŁo: conservar um espaĂ§o de coordenadas, uma noĂ§ĂŁo de tempo, uma textura, um comportamento de arredondamento, um limiar e uma intenĂ§ĂŁo visual.\n\nAs diferenĂ§as entre GLSL, MSL e Flutter sĂŁo administrĂĄveis. Elas ficam visĂ­veis sobretudo quando vocĂŞ exige paridade, e nĂŁo apenas uma aproximaĂ§ĂŁo bonita.\n\nĂ aĂ­ que o projeto fica interessante: uma pequena biblioteca grĂĄfica vira um laboratĂłrio prĂĄtico de portabilidade de render. A matemĂĄtica continua modesta, mas estĂĄ em toda parte: nas coordenadas, nas rotaĂ§Ăľes, no ruĂ­do, na quantizaĂ§ĂŁo e nas derivadas. E ĂŠ justamente porque ela ĂŠ simples que precisa ser alinhada com cuidado.\n"])</script><script>self.__next_f.push([1,"21:T106c7,"])</script><script>self.__next_f.push([1,"\n\u003cZoomableThemeImage\n  lightSrc=\"/images/2026/lorenz-clash/cover.webp\"\n  darkSrc=\"/images/2026/lorenz-clash/cover.webp\"\n  alt=\"Lorenz Clash em aĂ§ĂŁo\"\n  width={1600}\n  height={1200}\n  priority={true}\n/\u003e\n\n## Uma onda de calor e a matemĂĄtica do calor\n\nNo final de junho de 2026, a FranĂ§a atravessava uma [onda de calor brutal](https://meteofrance.com/actualites-et-dossiers/actualites/canicule-une-vague-de-chaleur-sinstalle-cette-semaine). Aquela em que o ar treme sobre o asfalto, onde tudo fica mais lento e onde vocĂŞ se vĂŞ olhando para o ar quente subindo de um telhado e se perguntando que formato ele realmente tem.\n\nEsse tremor do ar ĂŠ a **convecĂ§ĂŁo**: um fluido aquecido por baixo, que sobe, esfria, desce e enrola sobre si mesmo. E a convecĂ§ĂŁo tem um famoso conjunto de equaĂ§Ăľes associadas: aquelas que Edward Lorenz escreveu em 1963 tentando modelar precisamente isso, a atmosfera agitada pelo calor.\n\nEntĂŁo eu transformei isso em um brinquedo. **Lorenz Clash** ĂŠ uma experiĂŞncia audiovisual generativa WebGPU para a web mĂłvel, da qual vocĂŞ *faz parte*: vocĂŞ entra nela pela cĂ˘mera frontal â a lente selfie de um telefone, a webcam de um computador â e a sua prĂłpria imagem se torna uma matĂŠria que ĂŠ recortada, esticada e dissolvida ao longo da trajetĂłria 3D do atrator de Lorenz, essa curva nascida da matemĂĄtica do calor. Um aplicativo nascido de uma onda de calor, baseado em equaĂ§Ăľes de calor. A simetria era boa demais para deixar passar.\n\nEste artigo ĂŠ um mergulho tĂŠcnico: a **matemĂĄtica** por trĂĄs do caos, o **pipeline de renderizaĂ§ĂŁo WebGPU** e sua linguagem de shader, **WGSL** (WebGPU Shading Language), a **anĂĄlise da estrutura musical** que permite que a experiĂŞncia corte e respire com uma mĂşsica, a **exportaĂ§ĂŁo de vĂ­deo sem servidor** que salva tudo localmente, a **luta para sobreviver em um tablet com memĂłria limitada** e a estrutura de **Progressive Web App** (PWA) que permite a instalaĂ§ĂŁo em tela cheia em iOS e Android. Este nĂŁo ĂŠ um tour linha por linha do cĂłdigo-fonte (que serĂĄ publicado Ă  parte); sĂŁo as ideias, as decisĂľes de design e as war stories.\n\n\u003cCallout type=\"tip\" title=\"Testar / ler o cĂłdigo\"\u003e\n  \u003cdiv className=\"not-prose flex flex-col gap-5 md:flex-row md:items-center md:justify-between\"\u003e\n    \u003ca\n      href=\"https://lorenzclash.andrefrelicot.dev/\"\n      target=\"_blank\"\n      rel=\"noopener noreferrer\"\n      className=\"group flex items-center gap-4 rounded-lg border border-foreground/15 p-4 text-foreground transition hover:border-foreground/35 hover:bg-foreground/5\"\n    \u003e\n      \u003cimg\n        src=\"/images/2026/lorenz-clash/lorenzclash-logo.svg\"\n        alt=\"Logo Lorenz Clash\"\n        width={72}\n        height={63}\n        className=\"h-16 w-auto shrink-0 transition group-hover:scale-105\"\n      /\u003e\n      \u003cspan className=\"flex flex-col gap-1\"\u003e\n        \u003cspan className=\"text-base font-semibold\"\u003eAbrir o app â\u003c/span\u003e\n        \u003cspan className=\"text-sm text-foreground/70\"\u003e\nFunciona bem em dispositivos mĂłveis, mas se destaca na tela grande com uma webcam. Fones de ouvido recomendados.\n        \u003c/span\u003e\n      \u003c/span\u003e\n    \u003c/a\u003e\n\n    \u003cdiv className=\"flex flex-col gap-2 md:min-w-[16rem] md:border-l md:border-foreground/15 md:pl-5\"\u003e\n      \u003cdiv className=\"text-xs font-semibold uppercase tracking-wide text-foreground/60\"\u003eCĂłdigo-fonte\u003c/div\u003e\n      \u003cGitHubLink href=\"https://github.com/AndreFrelicot/lorenzclash\" label=\"CĂłdigo-fonte no GitHub\" className=\"w-fit\" /\u003e\n    \u003c/div\u003e\n  \u003c/div\u003e\n\u003c/Callout\u003e\n\n## Uma experiĂŞncia da qual vocĂŞ faz parte\n\nNĂŁo ĂŠ um aplicativo que vocĂŞ *usa* como ferramenta: ĂŠ uma experiĂŞncia na qual vocĂŞ entra. Tudo ĂŠ baseado em uma Ăşnica relaĂ§ĂŁo:\n\n\u003e A cĂ˘mera ĂŠ a **matĂŠria**. O atrator de Lorenz ĂŠ a **forĂ§a**. Sua mĂŁo na tela ĂŠ o **gesto**. O ĂĄudio ĂŠ a **textura**.\n\nDeliberadamente **nĂŁo** ĂŠ um visualizador de ĂĄudio, nem um filtro de cĂ˘mera. A cĂ˘mera (ou, quando desligada, uma fonte procedural) ĂŠ o *principal material visual*: ĂŠ transportada pela curva caĂłtica, envelhecida, pixelizada e dissolvida.\n\nE hĂĄ uma ideia mais discreta por baixo. Como a cĂ˘mera estĂĄ sempre voltada para vocĂŞ, *vocĂŞ* ĂŠ o material: seu rosto, seu quarto, injetado como mais uma condiĂ§ĂŁo inicial em um sistema caĂłtico. Ă uma liĂ§ĂŁo curta em duas metades. Por um lado, **responsabilidade**: o que a peĂ§a se torna depende do que vocĂŞ escolhe dar a ela. Por outro lado, o lembrete de que **isso estĂĄ alĂŠm do seu controle**: ĂŠ o efeito borboleta, o mesmo gesto nunca cai no mesmo lugar duas vezes, e vocĂŞ nunca pode realmente prever, muito menos controlar, onde o caos levarĂĄ seu reflexo. VocĂŞ ĂŠ inegavelmente *parte* do sistema e, inegavelmente, nĂŁo estĂĄ no controle dele. Se vocĂŞ jĂĄ passou por uma onda de calor e se perguntou como chegamos aqui, esse duplo vĂ­nculo deve ressoar.\n\nAlgumas regras inegociĂĄveis orientaram todas as decisĂľes:\n\n- **Tudo ĂŠ executado no dispositivo.** O stream de vĂ­deo nunca sai do telefone: sem upload, sem back-end, sem rastreamento.\n- **CĂ˘mera e ĂĄudio sĂŁo opcionais, o movimento nunca ĂŠ necessĂĄrio.** Negue a cĂ˘mera e a peĂ§a ainda funciona (uma fonte procedural assume o controle). Silencie o som e os recursos visuais continuarĂŁo a responder. Ignore os gestos de toque e o sistema ainda respira.\n- **Nunca valores brutos.** As entradas de toque e ĂĄudio sĂŁo sempre suavizadas antes de atingir um shader ou parĂ˘metro. O caos jĂĄ ĂŠ selvagem o suficiente sem injetar tremor.\n- **Sem fallback WebGL.** Sem WebGPU significa uma tela limpa \"sem suporte\", nĂŁo uma experiĂŞncia degradada.\n\n## Lorenz, 1963: caos determinĂ­stico em trĂŞs equaĂ§Ăľes\n\nUm pouco de histĂłria, porque dĂĄ sabor ao resto.\n\n**Edward Norton Lorenz** (1917â2008) foi meteorologista e matemĂĄtico do MIT. Usando as equaĂ§Ăľes de Barry Saltzman para convecĂ§ĂŁo tĂŠrmica, ele reduziu o problema a **trĂŞs equaĂ§Ăľes diferenciais ordinĂĄrias acopladas** e publicou [*Deterministic Nonperiodic Flow*](https://journals.ametsoc.org/view/journals/atsc/20/2/1520-0469_1963_020_0130_dnf_2_0_co_2.xml) em 1963 - um dos artigos mais citados na ĂĄrea.\n\nA lenda ĂŠ verdadeira: dois anos antes, ao executar novamente uma simulaĂ§ĂŁo meteorolĂłgica em um Royal McBee LGP-30, Lorenz digitou novamente um valor no formato `0.506` em vez do valor armazenado `0.506127`. A previsĂŁo divergiu completamente. Um erro de arredondamento para a quarta casa decimal reescreveu a previsĂŁo do tempo. Esta ĂŠ uma **dependĂŞncia sensĂ­vel das condiĂ§Ăľes iniciais** â mais tarde apelidada de **efeito borboleta**, apĂłs sua conferĂŞncia de 1972 *\"O bater de asas de uma borboleta no Brasil pode provocar um tornado no Texas?\"* (o atrator tambĂŠm se parece com uma borboleta, o que nunca prejudica a narrativa).\n\nO que torna o atrator de Lorenz *estranho*: sua trajetĂłria ĂŠ **limitada** (nunca escapa), **nunca periĂłdica** (nunca se repete), **sem autointerseĂ§ĂŁo** e vive em um **fractal** de dimensĂŁo nĂŁo inteira (Hausdorff) â 2,06. O sistema ĂŠ **dissipativo**: os volumes do espaĂ§o de fase se contraem a uma taxa constante, com a divergĂŞncia do campo sendo uma constante negativa. E, no entanto, as trajetĂłrias sĂŁo caĂłticas: tudo desmorona num fractal de volume zero, enquanto dois caminhos vizinhos se afastam exponencialmente. Essa taxa de afastamento tem um nĂşmero: o maior **expoente de Lyapunov**, aproximadamente **0,906** em parĂ˘metros canĂ´nicos. Ele mede exatamente a rapidez com que o efeito borboleta se amplifica: um pequeno erro dobra aproximadamente a cada trĂŞs quartos de unidade de tempo, atĂŠ que toda a previsĂŁo seja perdida.\n\n\u003cCallout type=\"info\" title=\"Os parĂ˘metros sĂŁo fĂ­sica, nĂŁo nĂşmeros mĂĄgicos\"\u003e\nNo modelo de convecĂ§ĂŁo, as trĂŞs constantes tĂŞm um significado concreto:\n\n  - **Ď (sigma)** ĂŠ o **nĂşmero de Prandtl**: difusividade do momento dividida pela difusividade tĂŠrmica.\n  - **Ď (rho)** ĂŠ um **nĂşmero de Rayleigh** normalizado: basicamente, *quanto aquecemos por baixo*. Abaixo de um valor crĂ­tico prĂłximo de 24,74, o fluxo se estabiliza; acima, o caos aparece. O clĂĄssico **Ď = 28** estĂĄ confortavelmente no regime caĂłtico.\n  - **Î˛ (beta)** ĂŠ um fator geomĂŠtrico ligado Ă  proporĂ§ĂŁo dos rolos de convecĂ§ĂŁo.\n\nO botĂŁo âintensidadeâ do aplicativo ĂŠ, portanto, literalmente um termostato. Bastante adequado para um aplicativo nascido de uma onda de calor.\n\u003c/Callout\u003e\n\nE vocĂŞ pode *ver* um sistema caindo no caos girando esse termostato. Mantenha Ď e Î˛ em seus valores canĂ´nicos e varie Ď: em **Ď = 14**, o fluxo espirala calmamente em direĂ§ĂŁo a um ponto fixo e permanece lĂĄ; leve-o a **Ď â 24**, logo abaixo do limite, e ele oscila - longos transientes errantes que quase parecem se estabilizar, mas nunca chegam lĂĄ; em **Ď = 28**, ele nĂŁo se estabiliza mais. As mesmas trĂŞs equaĂ§Ăľes, apenas um nĂşmero mais quente.\n\n\u003cZoomableThemeImage\n  lightSrc=\"/images/2026/lorenz-clash/rho-triptych.webp\"\n  darkSrc=\"/images/2026/lorenz-clash/rho-triptych.webp\"\n  alt=\"TrĂŞs trajetĂłrias de Lorenz lado a lado com rho = 14 (espiral em direĂ§ĂŁo a um ponto fixo), rho = 24 (longo transitĂłrio Ă  beira do caos) e rho = 28 (o atrator estranho completo).\"\n  width={1672}\n  height={941}\n/\u003e\n\nE ainda importa. O resultado de Lorenz explica *por que* o tempo meteorolĂłgico sĂł ĂŠ previsĂ­vel durante cerca de duas semanas, e por que as previsĂľes modernas sĂŁo feitas em **conjuntos**: incluĂ­mos muitos estados iniciais ligeiramente perturbados e prevemos uma *distribuiĂ§ĂŁo*, nĂŁo uma Ăşnica linha. A mesma ideia separa o **tempo meteorolĂłgico** (um episĂłdio caĂłtico de calor) do **clima** (a linha de base que se move silenciosamente abaixo). AlĂŠm da meteorologia, o sistema Lorenz aparece na eletrĂ´nica nĂŁo linear, na biologia populacional, na comunicaĂ§ĂŁo segura por sincronizaĂ§ĂŁo caĂłtica e em muita arte generativa â incluindo esta.\n\n## MatemĂĄtica, tijolo por tijolo\n\n### O sistema\n\n$$\n\\frac{dx}{dt} = \\sigma\\,(y - x), \\qquad\n\\frac{dy}{dt} = x\\,(\\rho - z) - y, \\qquad\n\\frac{dz}{dt} = x\\,y - \\beta\\,z\n$$\n\nCom as constantes canĂ´nicas **Ď = 10, Ď = 28, Î˛ = 8/3 â 2,667**, esta ĂŠ uma transcriĂ§ĂŁo direta:\n\n```ts\nfunction lorenz(p: Vec3, params: LorenzParams): Vec3 {\n  const [x, y, z] = p;\n  return [\n    params.sigma * (y - x),\n    x * (params.rho - z) - y,\n    x * y - params.beta * z,\n  ];\n}\n```\n\n### Dica #1 â integre o campo *normalizado*, para que a fita avance em velocidade constante\n\nAqui estĂĄ a primeira decisĂŁo nĂŁo Ăłbvia. A velocidade bruta de Lorenz varia enormemente ao longo da curva: rĂĄpida nos grandes arcos externos, quase parada perto dos pontos fixos. Se vocĂŞ gerar a geometria da fita âpor unidade de tempoâ, os ladrilhos acabam esticados em alguns lugares e amontoados em outros.\n\nA correĂ§ĂŁo: **normalizar o campo para unidade de comprimento** e avanĂ§ar em **comprimento de arco** em vez de no tempo.\n\n$$\n\\hat{f}(\\mathbf{p}) = \\frac{f(\\mathbf{p})}{\\lVert f(\\mathbf{p}) \\rVert}\n$$\n\n```ts\nfunction field(p: Vec3, params: LorenzParams): Vec3 {\n  const v = lorenz(p, params);\n  const len = Math.hypot(v[0], v[1], v[2]);\n  if (len \u003c FIELD_EPS) return v;          // don't divide by ~0 near fixed points\n  return [v[0] / len, v[1] / len, v[2] / len];\n}\n```\n\nA cabeĂ§a da curva entĂŁo caminha sobre o atrator a uma taxa regular, qualquer que seja sua posiĂ§ĂŁo, e um depĂłsito colocado em cada passo fixo de comprimento de arco produz uma fita de ladrilhos perfeitamente regulares. A velocidade se torna um simples multiplicador por cima, em vez de ser uma propriedade da geometria.\n\n\u003cZoomableThemeImage\n  lightSrc=\"/images/2026/lorenz-clash/diagram-normalized-field-light-v1.png\"\n  darkSrc=\"/images/2026/lorenz-clash/diagram-normalized-field-light-v1.png\"\n  alt=\"O campo bruto de Lorenz tem uma velocidade irregular, o que produz depĂłsitos compactados ou esticados; normalizar o campo o transforma em movimento de comprimento de arco constante e ladrilhos de fita uniformemente espaĂ§ados.\"\n  width={1672}\n  height={941}\n/\u003e\n\n### Dica #2 â Runge-Kutta de ordem 4 (RK4), porque o caos pune a integraĂ§ĂŁo aproximada\n\nA forma sĂł permanece reconhecĂ­vel se o integrador for preciso. A cabeĂ§a, portanto, avanĂ§a com o **Runge-Kutta clĂĄssico de ordem 4** neste campo normalizado:\n\n$$\nk_1 = \\hat f(p),\\quad\nk_2 = \\hat f\\!\\left(p + \\tfrac{h}{2}k_1\\right),\\quad\nk_3 = \\hat f\\!\\left(p + \\tfrac{h}{2}k_2\\right),\\quad\nk_4 = \\hat f(p + h\\,k_3)\n$$\n\n$$\np_{n+1} = p_n + \\frac{h}{6}\\,(k_1 + 2k_2 + 2k_3 + k_4)\n$$\n\nNĂŁo hĂĄ `dt` de relĂłgio fixo: a etapa `h` ĂŠ uma **etapa de comprimento de arco** (limitada por subetapa), derivada do tempo do quadro multiplicado pela velocidade atual. Os deltas de quadros sĂŁo limitados para que uma lentidĂŁo ou uma aba em segundo plano nunca faĂ§a o sistema explodir; e se uma coordenada se tornar nĂŁo finita ou o ponto exceder um raio seguro, ele simplesmente reaparecerĂĄ perto da origem.\n\n### O âClashâ â dois atratores e o efeito borboleta, tornados visĂ­veis\n\nO nome vem do fato de que **dois** atratores rodam ao mesmo tempo. O mesmo `Ď/Ď/Î˛`, mas **condiĂ§Ăľes iniciais diferentes**: a curva A comeĂ§a perto da origem, a curva B comeĂ§a em outro lugar. Como o sistema ĂŠ caĂłtico, essas duas sementes **divergem** em dois caminhos independentes: o efeito borboleta, encenado como uma coreografia. A curva B ĂŠ entĂŁo **girada aproximadamente 90Â°** para cruzar fisicamente a curva A no centro da cena. Esta intersecĂ§ĂŁo ĂŠ o *clash*.\n\n### O hub â uma fita que *grava* um caos em mutaĂ§ĂŁo\n\nCada quadro, antes dos integradores avanĂ§arem, uma Ăşnica funĂ§ĂŁo incorpora o ĂĄudio e o movimento aos parĂ˘metros ao vivo, com suavizaĂ§ĂŁo e limites para permanecer na zona do âbelo caosâ:\n\n$$\n\\sigma = \\mathrm{clamp}\\!\\left(10 + \\Delta\\sigma_{\\text{audio}} + 3.5\\,t_x,\\; 6,\\; 16\\right)\n$$\n$$\n\\rho = \\mathrm{clamp}\\!\\left(28 + \\Delta\\rho_{\\text{audio}} + 8.0\\,t_y,\\; 18,\\; 42\\right)\n$$\n$$\n\\beta = \\mathrm{clamp}\\!\\left(\\tfrac{8}{3} + \\Delta\\beta_{\\text{audio}} + 0.35\\,\\text{twist},\\; 1.8,\\; 3.4\\right)\n$$\n\n```ts\nconst sigma = clamp(10 + m.sigma + ms.tiltX * 3.5 * mm.tilt, 6, 16);\nconst rho = clamp(28 + m.rho + ms.tiltY * 8.0 * mm.tilt, 18, 42);\nconst beta = clamp(8 / 3 + m.beta + ms.twist * 0.35 * mm.twist, 1.8, 3.4);\nthis.lorenz.setParams(sigma, rho, beta);\nthis.lorenz2?.setParams(sigma, rho, beta);\n```\n\nO volume e os beats pressionam **Ď** (o grande botĂŁo \"caos\"), os agudos mudam ligeiramente **Ď**, os beats tocam **Î˛**, e seu dedo acrescenta a tudo isso: deslizar sobre a imagem pressiona Ď/Ď e curva Î˛. Como os parĂ˘metros mudam *antes* de cada depĂłsito, a fita se torna um **registro**: sua cabeĂ§a ĂŠ o caos de *agora*, sua cauda ĂŠ o caos de alguns segundos atrĂĄs, congelada na geometria.\n\n### Um segundo uso de Lorenz: mĂĄscaras de dissoluĂ§ĂŁo\n\nUm segundo integrador Lorenz, completamente separado, roda apenas uma vez na inicializaĂ§ĂŁo. Ele renderiza **dez texturas de densidade 2D** â retratos projetados em forma de \"borboleta\" do atrator â usadas como **mĂĄscaras de dissoluĂ§ĂŁo**: as imagens de fundo em tela cheia nĂŁo apenas surgem, elas *se materializam ao longo das curvas do atrator*. A mesma matemĂĄtica, para um papel completamente diferente. (Este usa um Euler semi-implĂ­cito simples em dezenas de milhares de etapas; a precisĂŁo nĂŁo importa para um splat estĂĄtico.)\n\n## O pipeline grĂĄfico: WebGPU feito Ă  mĂŁo\n\n### ConfiguraĂ§ĂŁo e o Ăşnico limite que importa\n\nComeĂ§ar ĂŠ clĂĄssico: solicite um adaptador e um dispositivo, configure o canvas com o formato preferido e o `premultiplied` alfa, escute os eventos de device-lost e os erros nĂŁo capturados (o WebKit valida o WGSL mais estritamente do que o Chrome; um erro de validaĂ§ĂŁo silencioso fornece um quadro preto no iOS). Cada shader ĂŠ compilado por meio de um pequeno wrapper que chama `getCompilationInfo()` e **gera um erro na primeira mensagem**, para que uma falha apareĂ§a como texto em um telefone, em vez de nada.\n\nApenas um limite opcional ĂŠ solicitado: `maxTextureArrayLayers`, empurrado para 1024. Este nĂşmero define o limite do comprimento da fita, devido Ă  ideia central abaixo.\n\n### A ideia central: a fita *ĂŠ* o histĂłrico do integrador\n\nO integrador da CPU deposita uma amostra em cada etapa de comprimento de arco fixo em um **ring buffer**. Cada depĂłsito contĂŠm 12 valores de ponto flutuante: posiĂ§ĂŁo, nĂşmero de nascimento (que controla a idade), tangente, sinalizador de quadro-chave e **instantĂ˘neo de ĂĄudio congelado** no momento do nascimento. Cada **quadro de cĂ˘mera** capturado em um depĂłsito se torna **uma camada de `texture_2d_array`**; ĂŠ por isso que o nĂşmero de camadas limita o comprimento da fita. Como as texturas externas do WebGPU duram apenas um quadro, o renderizador copia cada depĂłsito imediatamente para o armazenamento persistente, em vez de manter uma referĂŞncia de cĂ˘mera ao vivo.\n\nO vertex shader da fita **nĂŁo possui buffer de vĂŠrtice**. A instĂ˘ncia `s` lĂŞ dois depĂłsitos consecutivos diretamente de um buffer de armazenamento somente leitura e constrĂłi um quad voltado para a cĂ˘mera a partir de `vertex_index`: o eixo longo segue o segmento 3D real, o eixo da largura ĂŠ a perpendicular no espaĂ§o de tela, dimensionada para que o ladrilho nunca se estique.\n\n```wgsl\nlet seg = B - A;\nlet segPlane = vec2\u003cf32\u003e(dot(seg, cam.right), dot(seg, cam.up));\nlet segLen = length(segPlane);\nlet dir = select(vec2\u003cf32\u003e(0.0, 1.0), segPlane / segLen, segLen \u003e 1e-5);\nlet perp = -dir.y * cam.right + dir.x * cam.up;\n```\n\nO fragment shader mistura os quadros de cĂ˘mera dos dois depĂłsitos das extremidades do segmento, lidos da matriz de texturas, e, quando um ladrilho envelhece, ele ganha a assinatura do aplicativo: ele **pixela**, entĂŁo cada bloco **encolhe, flutua e gira** atĂŠ desaparecer, com os buracos descartados:\n\n```wgsl\nlet prog = smoothstep(0.85, 1.0, age);\nlet rnd = hash22(cellId);\nlet drift = (rnd - vec2\u003cf32\u003e(0.5)) * prog * 0.5;\nlet ang = (rnd.x - 0.5) * prog * 1.8;\nlet cc = cos(ang);\nlet ss = sin(ang);\nvar lc = fract(baseUv * cells) - vec2\u003cf32\u003e(0.5) - drift;\nlc = vec2\u003cf32\u003e(cc * lc.x - ss * lc.y, ss * lc.x + cc * lc.y);\nlet half = 0.5 * (1.0 - prog);\nif (half \u003c= 0.002 || any(abs(lc) \u003e vec2\u003cf32\u003e(half))) {\n  discard;\n}\n```\n\n\u003cZoomableThemeImage\n  lightSrc=\"/images/2026/lorenz-clash/diagram-ring-buffer-ribbon-light-v2.png\"\n  darkSrc=\"/images/2026/lorenz-clash/diagram-ring-buffer-ribbon-light-v2.png\"\n  alt=\"A cĂ˘mera ou fonte sintĂŠtica ĂŠ capturada em um buffer de anel de matriz de textura; cada depĂłsito se torna um ladrilho de fita, portanto, a fita Lorenz visĂ­vel ĂŠ o histĂłrico do integrador.\"\n  width={1652}\n  height={952}\n/\u003e\n\n### CĂ˘mera desligada? O renderizador nĂŁo se importa\n\nUma restriĂ§ĂŁo importante foi que a peĂ§a permanecesse viva â e generativa â sem cĂ˘mera. O renderizador ĂŠ, portanto, **agnĂłstico em relaĂ§ĂŁo Ă  fonte**: um `SyntheticSource` procedural alimenta exatamente as mesmas camadas de matriz de textura que a cĂ˘mera. Ă uma cadeia de trĂŞs etapas:\n\n1. **Splat** â uma textura persistente, levemente desbotada a cada quadro, depois pintada de forma aditiva com uma gota suave por deposiĂ§ĂŁo viva de Lorenz. Um autorretrato do atrator, como feedback.\n2. **ColorizaĂ§ĂŁo** â o splat ĂŠ amostrado por meio de uma **distorĂ§ĂŁo de domĂ­nio** impulsionada por um **movimento browniano fracionĂĄrio** (fBm) de 4 oitavas e, em seguida, mapeado em uma **paleta de cossenos de IĂąigo QuĂ­lez**, com variaĂ§ĂŁo de matiz de acordo com o `z` ao vivo de Lorenz, o centrĂłide de ĂĄudio e um oscilador lento de baixa frequĂŞncia (LFO).\n\nAqui, fBm significa âempilhar vĂĄrias camadas de ruĂ­doâ: cada oitava ĂŠ duas vezes mais fina e com metade da intensidade da anterior. Uma camada parece uma aleatoriedade suave; quatro camadas comeĂ§am a evocar turbulĂŞncia natural.\n\n```wgsl\nfn fbm(p: vec2\u003cf32\u003e) -\u003e f32 {\n  var s = 0.0;\n  var amp = 0.5;\n  var freq = 1.0;\n  for (var i = 0; i \u003c 4; i = i + 1) {\n    s = s + amp * vnoise(p * freq);\n    freq = freq * 2.0;\n    amp = amp * 0.5;\n  }\n  return s;\n}\nfn pal(tIn: f32, shift: f32, sel: f32) -\u003e vec3\u003cf32\u003e {\n  let t = fract(tIn + shift);\n  var d = vec3\u003cf32\u003e(0.0, 0.33, 0.67);\n  if (sel \u003e 1.5) {\n    d = vec3\u003cf32\u003e(0.0, 0.10, 0.20);\n  } else if (sel \u003e 0.5) {\n    d = vec3\u003cf32\u003e(0.3, 0.20, 0.20);\n  }\n  return vec3\u003cf32\u003e(0.5) + vec3\u003cf32\u003e(0.5) * cos(6.28318 * (t + d));\n}\n```\n\n3. **Blit** â o resultado ĂŠ copiado para uma camada de anel, assim como o quadro de uma cĂ˘mera.\n\nO histĂłrico da fita, a dissoluĂ§ĂŁo do fundo e o brilho do quadro-chave continuam funcionando, independentemente de o material vir de uma lente ou de ruĂ­do.\n\n\u003cCallout type=\"info\" title=\"Uma nota sobre linhagem: a demoscene, em uma aba\"\u003e\nCodificado prĂłximo ao metal, cada pixel feito por matemĂĄtica em vez de assets, sincronizado com mĂşsica em tempo real, tudo como uma demonstraĂ§ĂŁo do que o hardware pode fazer: esse ĂŠ o espĂ­rito da **demoscene**, essa subcultura das dĂŠcadas de 1980 e 90 onde grupos de Amiga e PC extraĂ­am performances audiovisuais impossĂ­veis do silĂ­cio puro. Lorenz Clash assume esta linhagem: o campo estelar ĂŠ reconstruĂ­do proceduralmente (zero assets), os visuais sem cĂ˘mera sĂŁo puro ruĂ­do e feedback, e atĂŠ mesmo a cor vem da **paleta cosseno** de IĂąigo QuĂ­lez - IQ sendo um veterano da cena de demonstraĂ§ĂŁo cujo truque `a + bÂˇcos(2Ď(cÂˇt + d))` se tornou um vocabulĂĄrio padrĂŁo de grĂĄficos procedurais. Substitua o Amiga por uma GPU de telefone e o assembly por WGSL: o espĂ­rito permanece o mesmo.\n\u003c/Callout\u003e\n\n### O quadro, passagem por passagem\n\nTudo acontece em um Ăşnico codificador de comando, um Ăşnico envio. Quase todo trabalho visual depende de pipelines de renderizaĂ§ĂŁo: cada efeito de partĂ­cula ĂŠ calculado analiticamente em um vertex shader em cubos instanciados. A Ăşnica passagem de computaĂ§ĂŁo no aplicativo lanĂ§ado ĂŠ uma pequena sonda de cĂłpia de cĂ˘mera iOS que procura faixas pretas puras nas bordas antes de armazenar o quadro. A ordem:\n\n1. **Passagens de captura** â grave os quadros da cĂ˘mera (ou sintĂŠticos) nas camadas do ring buffer. Devem vir primeiro, jĂĄ que a cena os amostra.\n2. **Passagens de trilha** â um buffer persistente de meia resoluĂ§ĂŁo ĂŠ esmaecido e depois repintado, para criar uma trilha semelhante a fumaĂ§a.\n3. **Passagem de cena** (com teste de profundidade, em um alvo fora da tela quando o realce luminoso (bloom) estĂĄ ativado): cĂşpula de estrelas â grade de deformaĂ§ĂŁo â fitas e formas transformadas (curva A, depois curva B girada) â cometas e suas esteiras (wake) â partĂ­culas de dissoluĂ§ĂŁo da cauda â crista da cabeĂ§a.\n4. **Realce luminoso** â a cadeia de pĂłs-processamento.\n5. **Blit** â apresentaĂ§ĂŁo.\n\n\u003cZoomableThemeImage\n  lightSrc=\"/images/2026/lorenz-clash/diagram-frame-pipeline-light-v7.png\"\n  darkSrc=\"/images/2026/lorenz-clash/diagram-frame-pipeline-light-v7.png\"\n  alt=\"Um quadro WebGPU: captura no buffer de anel da matriz de textura, atualizaĂ§ĂŁo da trilha persistente, renderizaĂ§ĂŁo fora da tela da cena, bloom e, em seguida, copia a textura de apresentaĂ§ĂŁo de propriedade para o canvas e o caminho de exportaĂ§ĂŁo.\"\n  width={1650}\n  height={941}\n/\u003e\n\nUm breve passeio pelo que vive nesta passagem de cena:\n\n- **Viajantes/cometas** â um cubo e uma esfera percorrem cada curva em uma spline Catmull-Rom, espiralam no plano perpendicular Ă  tangente (em oposiĂ§ĂŁo de fase) e deixam uma **esteira** helicoidal.\n- **TransformaĂ§ĂŁo de forma** â uma onda cabeĂ§a-cauda transforma a fita em cubos e depois em esferas, como um fade *geomĂŠtrico* em vez de um fade alfa (a forma que entra cresce a partir da cabeĂ§a enquanto a forma que sai encolhe).\n- **Campo estelar** â uma cĂşpula procedural reconstruĂ­da a partir da base da cĂ˘mera, para que as estrelas girem corretamente quando a cĂ˘mera orbita. Zero assets.\n- **Crista da cabeĂ§a** â cubos aditivos no depĂłsito mais recente, transportados por uma onda senoidal reativa de ĂĄudio: o \"agora\" visĂ­vel da fita.\n- **Grade de deformaĂ§ĂŁo** â um piso de treliĂ§a movido por fBm, geralmente sutil, mas Ă s vezes atingido por frentes de onda de arco-Ă­ris que aceleram sobre sinais de ritmo.\n- **Brilho do quadro-chave** â quando um ladrilho corresponde a uma imagem capturada de alta definiĂ§ĂŁo (HD), seu depĂłsito carrega um sinalizador e pulsa com um destaque de cor dessincronizado.\n\nEsta grade merece ser detalhada, porque nĂŁo ĂŠ apenas uma linha do horizonte. Ă aqui que o campo de controle invisĂ­vel se torna diretamente visĂ­vel: uma rede regular de linhas 24x24 amostra um campo de altura fBm animado e, em seguida, o gesto de toque suave inclina essa superfĂ­cie como uma bandeja.\n\n```wgsl\nlet n = fbm(p.xz * noiseScale + vec2\u003cf32\u003e(t * flow, t * flow * 0.7)) - 0.5;\nworld.y = world.y + n * noiseAmp * amp;\nworld.y = world.y + (g.field.x * p.x + g.field.y * p.z);\n```\n\nA explosĂŁo ocasional do arco-Ă­ris ĂŠ um segundo campo colocado acima. VĂĄrios picos senoidais radiais se expandem a partir do centro, aceleram de acordo com `phaseÂ˛(1 + 2.2phase)`, sĂŁo acentuados por uma curva de potĂŞncia e depois desaparecem atravĂŠs de um envelope suave:\n\n```wgsl\nlet accel = phase * phase * (1.0 + phase * 2.2) * rainbowSpeed;\nlet crestPhase = radial * waves - accel * (waves + 1.5) + seed;\nlet crest = pow(0.5 + 0.5 * sin(crestPhase * 6.2831853), sharpness);\n```\n\nDurante este evento, o renderizador tambĂŠm aumenta a opacidade da grade para 100%, de modo que o solo se torna brevemente uma forma de onda emissiva antes de se dissolver novamente na rede azul discreta.\n\n\u003cCallout type=\"info\" title=\"War story: oito buffers uniformes, porque os writes passam Ă  frente dos draws\"\u003e\nOs cometas sĂŁo desenhados **oito** vezes por quadro: duas curvas, cada uma com um corpo cĂşbico, um corpo esfĂŠrico e a esteira de cada uma. A versĂŁo limpa reutiliza um pequeno buffer uniforme e o reescreve antes de cada draw. Isso torna todos os oito cometas *idĂŞnticos* - e o motivo ĂŠ a ordem da fila: `queue.writeBuffer` nĂŁo executa onde vocĂŞ o chama, ĂŠ enfileirado e todo o quadro ĂŠ um codificador de comando com um **Ăşnico `submit`**. Portanto, todos os oito writes sĂŁo executados *antes* de qualquer draw ler qualquer coisa, e cada draw lĂŞ a **Ăşltima** carga escrita. A correĂ§ĂŁo: um buffer uniforme por draw simultĂ˘neo, cada um escreve logo antes de sua draw call:\n\n  ```ts\n  const cometUniforms = Array.from({ length: 8 }, () =\u003e\n    device.createBuffer({\n      size: 20 * Float32Array.BYTES_PER_ELEMENT,\n      usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,\n    }),\n  );\n  this.writeCometUniform(0, this.cometA, 0, count, 0, 0, time, sA);\n  pass.setBindGroup(0, this.cometBindGroups[0]);\n  pass.draw(this.cubeVertexCount, 1);\n  this.writeCometUniform(1, this.cometA, 0, count, 0, Math.PI, time, sA);\n  pass.setBindGroup(0, this.cometBindGroups[1]);\n  pass.draw(this.sphereVertexCount, 1);\n  ```\n\u003c/Callout\u003e\n\n### A cĂ˘mera se enquadra\n\nTudo isso de nada serve se o ponto de vista nĂŁo sustenta a cena. Por padrĂŁo, a cĂ˘mera orbita lentamente com um campo de visĂŁo de 50Â°, mas tambĂŠm **se enquadra**: a cada quadro, ela pega a caixa delimitadora de todos os depĂłsitos vivos (as duas curvas) e se move para trĂĄs apenas o suficiente para trazer essa esfera abrangente para o **mais restrito** dos dois eixos de campo de visĂŁo.\n\n```ts\nconst halfV = FOV_Y / 2;\nconst halfH = Math.atan(Math.tan(halfV) * aspect);\n// fit into the tighter axis â a tall phone steps back, a wide screen leans in\nconst dist = (frameRadius * margin) / Math.sin(Math.min(halfV, halfH));\n```\n\nUm celular em modo retrato recua para manter todo o conflito no enquadramento; uma tela ampla de desktop se aproxima para preencher a imagem. O centro e o raio convergem muito lentamente em direĂ§ĂŁo aos seus alvos - fator de suavizaĂ§ĂŁo `0.03` - de modo que o enquadramento *flutua* com a respiraĂ§ĂŁo do atrator em vez de bombear a cada oscilaĂ§ĂŁo. E o cĂĄlculo usa intencionalmente o campo de visĂŁo (FOV) **base**, portanto, pinĂ§ar para aplicar zoom (aplicado como uma escala FOV, `FOV_Y / zoom`, uma lente telefoto verdadeira) ainda funciona *sobre* o autoenquadramento em vez de ser anulado por ele.\n\nDois modos **follow** substituem a Ăłrbita por um caminho na curva. *CabeĂ§a* fica logo atrĂĄs do mais novo depĂłsito e olha para frente, para a tangente suavizada â caos em primeira pessoa. *Cauda* fica na extremidade mais antiga e dissolvida e olha para ela - exceto que a curva dĂĄ uma volta, entĂŁo a tangente local gira sobre si mesma em cada volta e faria o olho dar uma pirueta. A correĂ§ĂŁo nĂŁo ĂŠ mirar ao longo da tangente, mas em direĂ§ĂŁo a um **depĂłsito real mais adiante na trilha**, usando a corda que o conecta como um rumo estĂĄvel, para manter a cauda em dissoluĂ§ĂŁo no alvo, mesmo no centro de um loop.\n\n### ComposiĂ§ĂŁo e pĂłs-processamento\n\nO realce luminoso ĂŠ um pingue-pongue de meia resoluĂ§ĂŁo: um **bright pass** com soft-knee que preserva o matiz, um **desfoque de caixa 5x5 passado duas vezes** (gaussiano barato e um pouco largo), depois uma **composiĂ§ĂŁo aditiva** sobre a cena. Aditivo intencionalmente: apenas elementos luminosos e emissivos (crista da cabeĂ§a, tonalidades das bordas, cometas, brilho do quadro-chave) ganham realce luminoso; o material da cĂ˘mera permanece limpo, entĂŁo o brilho parece uma luz localizada em vez de um vĂŠu global. A composiĂ§ĂŁo tambĂŠm esconde pequenos truques Ăłpticos do aplicativo: uma **ondulaĂ§ĂŁo** (ripple) radial que distorce a amostra durante a cĂ˘mera lenta, uma segunda **ondulaĂ§ĂŁo de pixel** cronometrada acionada por sinais rĂ­tmicos e flashes de cĂ˘mera planejados por Poisson que diminuem brevemente o limiar e aumentam a intensidade.\n\nA ondulaĂ§ĂŁo merece nossa atenĂ§ĂŁo, porque ĂŠ pura matemĂĄtica de shader que nĂŁo custa quase nada. Mova o tempo para cĂ˘mera lenta e a passagem composta curva toda a imagem com uma **onda radial viajante**. Para cada pixel, ele pega o vetor do centro da tela $\\mathbf{c} = \\mathbf{uv} - 0.5$, seu comprimento $d = \\lVert \\mathbf{c} \\rVert$, e empurra a coordenada de *amostragem* para fora ao longo deste raio com duas ondas senoidais da distĂ˘ncia:\n\n$$\n\\mathbf{uv}' = \\mathbf{uv} + \\frac{\\mathbf{c}}{d}\\,A\\,[\\,\\sin(kd - 2t) + 0.35\\,\\sin(0.53kd + 1.35t)\\,]\n$$\n\n```wgsl\nlet c = uv - vec2\u003cf32\u003e(0.5);\nlet d = length(c) + 1e-5;\nlet w = (\n  sin(d * bloom.fx.z - bloom.fx.y * 2.0) +\n  sin(d * bloom.fx.z * 0.53 + bloom.fx.y * 1.35) * 0.35\n) * amp;\nuv = uv + (c / d) * w;\nlet scene = textureSampleLevel(tex, samp, uv, 0.0).rgb;\nlet glow = textureSampleLevel(bloomTex, samp, uv, 0.0).rgb;\n```\n\nAlgumas opĂ§Ăľes o mantĂŞm elegante em vez de apelativo:\n\n- Distorce a coordenada de *amostragem* â uma lente de mapeamento reverso â sem geometria e sem passagem adicional; os anĂŠis concĂŞntricos comeĂ§am no centro quando o termo $-2t$ desliza o seno para fora, como ondulaĂ§Ăľes na ĂĄgua.\n- A frequĂŞncia espacial ĂŠ fixa ($k = 16$, cerca de um ou dois anĂŠis visĂ­veis) e a amplitude ĂŠ pequena: $A = \\text{slowmo} \\times (0.012 + 0.01\\,\\text{beat})$, no mĂĄximo ~2% da tela. O efeito *sugere* que a realidade se curva sem deixar vocĂŞ enjoado.\n- EstĂĄ condicionado a uma amplitude diferente de zero, portanto na velocidade normal o ramo ĂŠ pulado e o efeito ĂŠ literalmente de graĂ§a.\n- A cena **e** o brilho sĂŁo amostrados com o *mesmo* `uv` distorcido, de modo que o brilho ondula em sincronia em vez de se destacar da imagem.\n- A fase $t$ ĂŠ o relĂłgio da cena **dimensionado pelo warp**, entĂŁo a onda desacelera com a mĂşsica e retorna suavemente ao soltar; a ondulaĂ§ĂŁo pertence ao mesmo gesto de tape-stop, nĂŁo ĂŠ uma animaĂ§ĂŁo separada.\n\nEssa ondulaĂ§ĂŁo em cĂ˘mera lenta tornou-se entĂŁo um efeito por si sĂł. A **ondulaĂ§ĂŁo de pixel** usa a mesma passagem composta, mas com um uniform de evento separado: quando chega um roll, snare ou kick forte, o aplicativo lanĂ§a uma onda radial curta com quantidade, duraĂ§ĂŁo, frequĂŞncia e velocidade aleatĂłrias. O acaso ĂŠ importante. Uma ondulaĂ§ĂŁo fixa parece uma transiĂ§ĂŁo enlatada apĂłs trĂŞs acionamentos; um alcance limitado faz parecer que a mĂşsica estĂĄ enviando ondas de pressĂŁo para a cena. Se a partitura estiver calma, um fallback de Poisson esparso ainda pode desencadear um, de modo que o efeito permanece musicalmente alinhado sem depender do diretor automĂĄtico.\n\nO efeito que parece mais caro ĂŠ na verdade o mais simples conceitualmente: um **rastro de exposiĂ§ĂŁo**, como se vocĂŞ tivesse deixado o obturador aberto por alguns segundos. ApĂłs a composiĂ§ĂŁo final, uma pequena passagem de feedback temporal mistura a imagem atual com uma cĂłpia decadente da saĂ­da anterior em duas texturas de pingue-pongue de propriedade. O efeito aumenta, mantĂŠm, desaparece e nunca lĂŞ o swapchain ao vivo. Existem dois tempos: impactos curtos de cerca de **1,5 segundos**, geralmente em torno de cortes ou eventos rĂ­tmicos fortes, e arrastamentos longos de cerca de **20 segundos** para flutuaĂ§Ăľes, pontes e quebras mais calmas. Os nĂşmeros de disparo variam de acordo com a duraĂ§ĂŁo da mĂşsica: aos quatro minutos, o teto ĂŠ de **20 curtos** e **3 longos**, com mĂşsicas mais curtas ou mais longas sendo ajustadas proporcionalmente. Assim como as ondulaĂ§Ăľes, ele ĂŠ impulsionado pela partitura, mas independente do diretor de cĂ˘mera: cortar a cĂ˘mera automĂĄtica nĂŁo deve prejudicar a vida visual da mĂşsica.\n\nEste ĂŠ um bom resumo de toda a filosofia de composiĂ§ĂŁo: integre o efeito na passagem que jĂĄ toca todos os pixels, ou em uma Ăşnica pĂłs-passagem de propriedade quando o histĂłrico de tempo for necessĂĄrio, e mantenha o nĂşmero de camadas de renderizaĂ§ĂŁo sob controle.\n\n\u003cCallout type=\"info\" title=\"War story: nunca leia o swapchain ao vivo no iOS\"\u003e\nA imagem final ĂŠ renderizada em uma textura **de propriedade** e depois copiada para o canvas. Ler diretamente `getCurrentTexture()` â a ideia Ăłbvia â trava e corrompe a apresentaĂ§ĂŁo no Safari iOS. O desvio atravĂŠs de uma textura de propriedade tambĂŠm dĂĄ Ă  exportaĂ§ĂŁo de vĂ­deo uma superfĂ­cie estĂĄvel para captura, sem nunca tocar no swapchain ao vivo.\n\u003c/Callout\u003e\n\n### A camada reativa de ĂĄudio\n\nO ĂĄudio ĂŠ um `AnalyserNode` com tamanho de transformaĂ§ĂŁo rĂĄpida de Fourier (FFT) de 2048, conectado **antes** do ganho master: silenciar a mĂşsica torna-a silenciosa para seus ouvidos, mas mantĂŠm o visual em movimento. Cada quadro extrai o nĂ­vel de raiz da mĂŠdia quadrĂĄtica (RMS), graves/mĂŠdios/agudos (amplitude linear mĂŠdia em bandas Hz, normalizada para percentis medidos off-line), um **centrĂłide** espectral mapeado em log e uma estimativa de **beat** (fluxo de graves acima de uma mĂŠdia mĂłvel lenta - ataque rĂĄpido, decaimento lento).\n\nEsses recursos controlam trĂŞs partes separadas do sistema:\n\n- **Ao vivo e global**, empacotado no uniform de cĂ˘mera compartilhada - para agora controlar a crista da cabeĂ§a, matizes de borda, flashes de realce luminoso e modulaĂ§ĂŁo de parĂ˘metros.\n- **Congelado por depĂłsito** â o instantĂ˘neo gravado em cada ladrilho de fita em seu nascimento. Ă isso que faz da fita uma gravaĂ§ĂŁo: cada ladrilho mantĂŠm a **cor** (centrĂłide â paleta, apenas nas bordas), o **tamanho** (graves + beat â crescimento) e o **spin** (agudos) do momento em que nasceu, mesmo quando a mĂşsica jĂĄ progrediu.\n- **Tempo de transporte** â o gesto em cĂ˘mera lenta produz um `warp` suave de 1,0 atĂŠ cerca de 0,35. Esse mesmo nĂşmero desacelera a mĂşsica, a rolagem de Lorenz, a taxa de deposiĂ§ĂŁo, o movimento do cometa e a ondulaĂ§ĂŁo composta, de modo que o tape-stop seja lido como um evento Ăşnico em vez de cinco efeitos nĂŁo relacionados.\n\nO mapeamento ĂŠ deliberadamente pequeno o suficiente para permanecer legĂ­vel. **NĂ­vel mais beat** empurra **Ď** e velocidade de rolagem, o que dĂĄ a impressĂŁo de que o atrator estĂĄ respirando com o kick. Os **agudos** modificam ligeiramente **Ď** e adicionam spin/shimmer. O **beat** atinge **Î˛** e o realce luminoso pisca. O **centrĂłide** escolhe a paleta, mas especialmente nas bordas para que a textura da cĂ˘mera permaneĂ§a legĂ­vel no centro.\n\n\u003cZoomableThemeImage\n  lightSrc=\"/images/2026/lorenz-clash/diagram-audio-live-mapping-light-v2.png\"\n  darkSrc=\"/images/2026/lorenz-clash/diagram-audio-live-mapping-light-v2.png\"\n  alt=\"O grĂĄfico de ĂĄudio ao vivo pega a mĂşsica antes do ganho, extrai features FFT, mapeia-os para uniformes de GPU ao vivo e instantĂ˘neos de deposiĂ§ĂŁo congelada e direciona a distorĂ§ĂŁo em cĂ˘mera lenta para reproduĂ§ĂŁo de ĂĄudio, tempo de animaĂ§ĂŁo, ondulaĂ§ĂŁo e reamostragem de exportaĂ§ĂŁo.\"\n  width={1672}\n  height={941}\n/\u003e\n\n### Da FFT a uma partitura: estrutura musical offline\n\nA FFT ao vivo ĂŠ boa para *agora*: volume, brilho, quantidade de graves, ataque recente. Ela nĂŁo ĂŠ boa em saber *onde estamos na mĂşsica*. Uma introduĂ§ĂŁo, um breakdown, uma seĂ§ĂŁo de drive e uma ponte flutuante podem ter energia instantĂ˘nea semelhante por alguns segundos, mas exigem uma linguagem de cĂ˘mera diferente. Uma introduĂ§ĂŁo quer uma Ăłrbita ampla. Uma seĂ§ĂŁo intensa (drive) suporta planos de acompanhamento, cortes rĂĄpidos e cometas. Uma ponte tranquila ĂŠ o local certo para um rastro de longa exposiĂ§ĂŁo.\n\nA mĂşsica, portanto, tem uma segunda camada: uma **partitura offline** gerada uma vez com `librosa`, versionada em JavaScript Object Notation (JSON) e carregada pelo aplicativo em tempo de execuĂ§ĂŁo. O script ĂŠ um script Python `uv` independente:\n\n```bash\nuv run --python 3.12 scripts/analyze-track-structure.py\n```\n\nPara cada `.m4a` integrado, ele faz uma nova amostragem em **22,05 kHz**, calcula a forĂ§a de inĂ­cio, o tempo e os tempos de beats e, em seguida, deriva RMS, centrĂłide espectral, croma e coeficientes cepstrais da escala Mel (MFCC) em uma grade de um segundo. Uma curva de novidade compara o perfil local de caracterĂ­sticas antes e depois de cada ponto de tempo (oito segundos de contexto em cada lado), os picos tornam-se limites de seĂ§ĂŁo candidatos e cada seĂ§ĂŁo recebe um papel grosseiro: `intro`, `drive`, `groove`, `break`, `bridge`, `float` ou `outro`.\n\nA mesma passagem extrai dicas de ritmo em bandas separadas: fluxo de banda baixa para **kicks**, fluxo de banda alta para **snares**, fluxo de banda mĂŠdia para **toms** e sequĂŞncias de snare curtas e densas para **rolls**. Nas 11 faixas, o JSON atual contĂŠm **69 seĂ§Ăľes**, **4.875 beats**, **2.966 kicks**, **2.998 snares**, **1.408 toms** e **115 rolls** â aproximadamente **42 minutos** de tempos prĂŠ-analisados, ainda sem servidor ou aprendizado de mĂĄquina (ML) em tempo de execuĂ§ĂŁo.\n\nO tempo de execuĂ§ĂŁo trata esse JSON menos como uma âanĂĄliseâ do que como uma partitura:\n\n```json\n{\n  \"start\": 186,\n  \"end\": 238.379,\n  \"role\": \"drive\",\n  \"energy\": 0.583,\n  \"rhythm\": 0.222,\n  \"brightness\": 0.76,\n  \"director\": { \"view\": \"followA\", \"shape\": \"cube\", \"comet\": true }\n}\n```\n\n\u003cZoomableThemeImage\n  lightSrc=\"/images/2026/lorenz-clash/diagram-offline-music-score-light-v1.png\"\n  darkSrc=\"/images/2026/lorenz-clash/diagram-offline-music-score-light-v1.png\"\n  alt=\"O pipeline de partituras musicais off-line: as mĂşsicas locais sĂŁo analisadas com um script Python uv e librosa, reamostradas em 22,05 kHz, convertidas em features, papĂŠis de seĂ§ĂŁo e eventos rĂ­tmicos, versionadas em JSON e, em seguida, usadas pelo runtime director para acionar cues de cĂ˘mera e efeitos visuais.\"\n  width={1672}\n  height={941}\n/\u003e\n\nAgora sĂŁo dois diretores. O original ainda estĂĄ aqui: um clĂĄssico detector de novidades FFT ao vivo que compara um perfil de curto prazo com um perfil de longo prazo e muda quando o som se afasta o suficiente. O diretor estruturado ĂŠ colocado prĂłximo a ele, sem ser modificado pelo detector vivo. Quando a reproduĂ§ĂŁo entra em uma nova seĂ§ĂŁo analisada, ela aplica a predefiniĂ§ĂŁo da seĂ§ĂŁo; quando beats, snares, toms e rolls passam sob o indicador de reproduĂ§ĂŁo, ele emite pequenos sinais que podem acionar **pulsos de zoom**, **saltos rĂĄpidos de cĂ˘mera**, **cometas**, **ondas de grade**, **ondulaĂ§Ăľes de pixel** e **rastros de exposiĂ§ĂŁo**. A cor, o crescimento e o brilho ainda vĂŞm da FFT ao vivo, entĂŁo a partitura nunca congela a performance: apenas fornece um mapa ao sistema.\n\nEssa separaĂ§ĂŁo ĂŠ importante. Podemos cortar o diretor da cĂ˘mera enquanto mantemos os efeitos impulsionados pela partitura: a mĂşsica pode continuar a enviar ondulaĂ§Ăľes e momentos de exposiĂ§ĂŁo ao renderizador sem assumir o controle da visĂŁo. TambĂŠm evita que a experiĂŞncia pareĂ§a um videoclipe congelado. As mudanĂ§as de seĂ§ĂŁo sĂŁo Ă˘ncoras determinĂ­sticas, mas os microeventos mantĂŞm probabilidades, tempos de espera e intervalos aleatĂłrios, de modo que a mesma mĂşsica mantĂŠm uma estrutura reconhecĂ­vel sem repetir exatamente os mesmos cortes todas as vezes.\n\n\u003cCallout type=\"info\" title=\"War story: iOS quebrou a cĂ˘mera lenta Ăłbvia\"\u003e\nA implementaĂ§ĂŁo Ăłbvia ĂŠ `audioElement.playbackRate = warp`. Isso funciona atĂŠ que este item seja roteado para `createMediaElementSource()` no iOS, onde alterar a velocidade pode silenciar ou armazenar novamente em buffer o ĂĄudio. A soluĂ§ĂŁo alternativa ĂŠ mais pesada, mas estĂĄvel: decodifique a peĂ§a atual com antecedĂŞncia, mude para `AudioBufferSourceNode` quando `warp \u003c 0.99`, controle o `playbackRate` deste nĂł e envie-o para o mesmo analisador. Voltar ao normal ĂŠ apenas `rate â 1` â sem seek, sem reinĂ­cio. O elemento `\u003caudio\u003e` original sĂł assume o controle na prĂłxima mĂşsica.\n\u003c/Callout\u003e\n\nE uma observaĂ§ĂŁo honesta sobre a mĂşsica em si: cada faixa ĂŠ **Goa trance original, gerada com [Suno](https://suno.com)** e codificada em Advanced Audio Coding (AAC) a 192 kbps. O gĂŞnero merece seu lugar: seu kick regular de four-on-the-floor dĂĄ ao detector de beat de fluxo de graves algo claro para se agarrar, e seus longos builds e quedas mapeiam naturalmente para Ď, que aumenta e depois desce novamente.\n\n\u003cCallout type=\"info\" title=\"A trilha sonora â 11 faixas, aproximadamente 42 minutos, todas feitas com Suno\"\u003e\nCada tĂ­tulo ĂŠ um link direto para seu `.m4a` â tomadas exclusivas, cada uma com mais de trĂŞs minutos de duraĂ§ĂŁo:\n\n  | # | Faixa | DuraĂ§ĂŁo |\n  | --: | :-- | --: |\n  | 01 | [Chrome Serpent](https://lorenzclash.andrefrelicot.dev/audio/01_chrome_serpent.m4a) | 3:58 |\n  | 02 | [Glacier Drift](https://lorenzclash.andrefrelicot.dev/audio/02_glacier_drift.m4a) | 4:35 |\n  | 03 | [Mandelbrot Mary](https://lorenzclash.andrefrelicot.dev/audio/03_mandelbrot_mary.m4a) | 3:24 |\n  | 04 | [Mandelbrot Mirage](https://lorenzclash.andrefrelicot.dev/audio/04_mandelbrot_mirage.m4a) | 3:55 |\n  | 05 | [Ritual Trace](https://lorenzclash.andrefrelicot.dev/audio/05_ritual_trace.m4a) | 4:07 |\n  | 06 | [Sea Ice Drift](https://lorenzclash.andrefrelicot.dev/audio/06_sea_ice_drift.m4a) | 3:39 |\n  | 07 | [Serpent Coil](https://lorenzclash.andrefrelicot.dev/audio/07_serpent_coil.m4a) | 3:43 |\n  | 08 | [Serpent Helix](https://lorenzclash.andrefrelicot.dev/audio/08_serpent_helix.m4a) | 4:26 |\n  | 09 | [Solar Halo Pulse](https://lorenzclash.andrefrelicot.dev/audio/09_solar_halo_pulse.m4a) | 3:23 |\n  | 10 | [Spirale de Lorenz](https://lorenzclash.andrefrelicot.dev/audio/10_spirale_de_lorenz.m4a) | 3:02 |\n  | 11 | [Tribal Trace](https://lorenzclash.andrefrelicot.dev/audio/11_tribal_trace.m4a) | 3:57 |\n\u003c/Callout\u003e\n\n## Gravar: exportaĂ§ĂŁo de vĂ­deo local, sem servidor\n\nA peĂ§a ĂŠ generativa e nunca se repete; o seguinte desejo ĂŠ Ăłbvio: *guarde* um momento. Lorenz Clash grava e exporta vĂ­deo â um verdadeiro `.mp4`, com a mĂşsica integrada no contĂŞiner â e, fiel Ă  regra local, **nada toca um servidor**. Tudo roda no navegador, no telefone, e ĂŠ exatamente aĂ­ que fica interessante: codificar o vĂ­deo em uma aba sem estourar a memĂłria.\n\n\u003cZoomableThemeImage\n  lightSrc=\"/images/2026/lorenz-clash/diagram-export-pipeline-light-v1.png\"\n  darkSrc=\"/images/2026/lorenz-clash/diagram-export-pipeline-light-v1.png\"\n  alt=\"O pipeline de exportaĂ§ĂŁo copia a textura de apresentaĂ§ĂŁo WebGPU de propriedade para uma tela de captura fora da tela, codifica chunks H.264, armazena-os em IndexedDB, corta e codifica o ĂĄudio AAC e, em seguida, mistura os clipes selecionados em um MP4 local sem servidor.\"\n  width={1672}\n  height={941}\n/\u003e\n\n### De onde vĂŞm os quadros\n\nA captura reutiliza o truque da textura prĂłpria (owned) da war story de composiĂ§ĂŁo. Um quadro gravado **nunca** ĂŠ lido no canvas ao vivo; o composto finalizado - jĂĄ no `presentTexture` de propriedade - ĂŠ colocado em um `OffscreenCanvas` separado (seu prĂłprio contexto WebGPU), entĂŁo este canvas ĂŠ empacotado em `VideoFrame` WebCodecs:\n\n```ts\n// blit the OWNED present texture into an offscreen capture canvas, then snapshot it\npass.setPipeline(this.blitPipeline);\npass.setBindGroup(0, this.blitBind);\npass.draw(3);\nthis.device.queue.submit([encoder.finish()]);\nreturn new VideoFrame(this.captureCanvas, { timestamp: timestampUs, duration: durationUs });\n```\n\nLer cada quadro do swapchain ao vivo ĂŠ o que torna o Safari iOS problemĂĄtico; o caminho de exportaĂ§ĂŁo nunca faz isso e o mesmo canvas de propriedade tambĂŠm ĂŠ usado para o caminho de captura de PNG.\n\n### CodificaĂ§ĂŁo de streaming: mantenha chunks, nunca quadros\n\nUm gravador ingĂŞnuo acumula quadros brutos e codifica no final, mas um minuto de quadros brutos em 1080p representa gigabytes. Aqui, cada quadro ĂŠ enviado diretamente para um WebCodecs `VideoEncoder` a 30 fps e depois **fechado imediatamente**, para que a RAM contenha apenas a saĂ­da *compactada* (alguns MB por clipe):\n\n```ts\nconst frame = this.src.grabCompositeFrame(this.outW, this.outH, tsUs, FRAME_DUR_US); // tsUs: real elapsed Âľs\nthis.encoder.encode(frame, { keyFrame: s.frameIndex === 0 }); // one shared encoder, reset per clip\nframe.close(); // critical: never accumulate raw frames\n```\n\nO codificador de hardware jĂĄ roda fora do thread, entĂŁo nĂŁo hĂĄ necessidade de Web Worker: o thread principal quase nĂŁo estĂĄ envolvido. A escolha do codec ĂŠ uma sondagem rĂĄpida de capacidade: H.264 nĂ­vel 4.0 primeiro (mĂłvel), depois 5.0/5.1/5.2 para quadros grandes de desktop/Retina que excedem o teto do macrobloco de nĂ­vel 4.0; se nĂŁo existir nenhum codificador H.264, o recurso serĂĄ desativado discretamente. Um *clipe* (uma \"sequĂŞncia\") ĂŠ uma apariĂ§ĂŁo do fundo â uma imagem HD que se dissolve e depois desaparece â capturado automaticamente, alĂŠm de instantĂ˘neos manuais de um toque, coletados para curadoria (consulte *Sobreviva* para explicar por que a captura automĂĄtica pausa em vez de reciclar).\n\n\u003cCallout type=\"info\" title=\"War story: chunks codificados ficam no disco, caso contrĂĄrio, OOM mĂłvel\"\u003e\nMesmo compactado, o vĂ­deo se acumula â cerca de 1 MB por segundo â e uma longa sessĂŁo de instantĂ˘neo bloquearia tudo no heap JavaScript (JS) antes de travar a aba em um telefone por falta de memĂłria (OOM). Os chunks H.264 codificados sĂŁo, portanto, descarregados em **IndexedDB**: a RAM mantĂŠm apenas metadados leves e uma miniatura de 200 px por clipe; os bytes ficam no disco. O armazenamento tem **escopo de sessĂŁo** â limpo toda vez que ĂŠ iniciado â o que tambĂŠm significa que o vĂ­deo da cĂ˘mera nĂŁo permanece no dispositivo depois que vocĂŞ sai. NĂŁo hĂĄ IndexedDB (modo privado)? Recorre Ă  RAM. A pressĂŁo de armazenamento vem de `navigator.storage.estimate()`: clipes automĂĄticos param de acumular alĂŠm de 60% de uso, instantĂ˘neos manuais alĂŠm de 85%.\n\u003c/Callout\u003e\n\n### Exportar: mux, nĂŁo recodificar\n\nComo cada quadro jĂĄ foi codificado *ao vivo*, montar o arquivo ĂŠ barato: ĂŠ um **mux**, nĂŁo uma recodificaĂ§ĂŁo. [mp4-muxer](https://www.npmjs.com/package/mp4-muxer) monta os clipes ajustando os timestamps para que eles sejam reproduzidos de ponta a ponta, buscando os chunks de cada clipe do IndexedDB **um clipe por vez** para que o heap nunca volte a se encher com o rolo inteiro:\n\n```ts\nfor (const chunk of payload.chunks) {\n  muxer.addVideoChunk(chunk, metaWritten ? undefined : payload.meta, chunk.timestamp + tOffsetUs);\n  metaWritten = true;\n}\ntOffsetUs += seq.durationUs; // next clip starts where this one ended\n```\n\n### A trilha sonora ĂŠ a verdadeira mĂşsica\n\nO ĂĄudio na exportaĂ§ĂŁo nĂŁo ĂŠ uma gravaĂ§ĂŁo da saĂ­da: ĂŠ a **mĂşsica real** que estava tocando, redecodificada do `.m4a` local, cortada nas janelas de cada clipe e colocada de ponta a ponta com fades de borda de cerca de 10 ms para evitar cliques. Duas pequenas war stories tornaram isso mais difĂ­cil do que parece.\n\n\u003cCallout type=\"info\" title=\"War story: decodifique com um OfflineAudioContext, nunca real\"\u003e\nA decodificaĂ§ĂŁo da mĂşsica requer um `AudioContext`, mas a criaĂ§ĂŁo de um *real* captura a sessĂŁo de ĂĄudio do hardware e, no iOS, isso **suspende o contexto da mĂşsica ao vivo**, deixando o aplicativo silencioso atĂŠ recarregar; cada exportaĂ§ĂŁo ou visualizaĂ§ĂŁo mataria o som. A correĂ§ĂŁo ĂŠ decodificar atravĂŠs de um **`OfflineAudioContext`**, que ĂŠ renderizado em um buffer e nĂŁo tem sessĂŁo de saĂ­da, portanto permanece completamente inerte. E como decodificar uma mĂşsica completa de vĂĄrios minutos ĂŠ de longe a etapa mais pesada, a Ăşltima mĂşsica decodificada ĂŠ armazenada em cache - mas apenas uma entrada, porque uma mĂşsica estĂŠreo decodificada de 8 minutos a 48 kHz pesa aproximadamente 180 MB e manter duas faria OOM.\n\u003c/Callout\u003e\n\nQuando vocĂŞ puxa os visuais para a cĂ˘mera lenta, o som deve desacelerar com eles: cada quadro gravado armazena, portanto, seu `warp` cĂ˘mera lenta, e a exportaĂ§ĂŁo **reamostra a mĂşsica de acordo com esse envelope**. A reproduĂ§ĂŁo avanĂ§a mais lentamente pelas amostras exatamente onde o vĂ­deo foi interrompido, com interpolaĂ§ĂŁo linear da posiĂ§ĂŁo agora fracionĂĄria. Ăltima armadilha: o `AudioEncoder` mĂłvel geralmente omite `AudioSpecificConfig` AAC e, sem ele, o mp4-muxer grava uma caixa `esds` quebrada e o arquivo ĂŠ reproduzido sem som. Esta configuraĂ§ĂŁo de 2 bytes ĂŠ, portanto, sintetizada manualmente e transmitida explicitamente ao muxer.\n\nO resultado ĂŠ um `.mp4` independente: sua fatia do caos, completa com mĂşsica, feita inteiramente no telefone.\n\n## Sobreviva: o iPad que ficou sem GPU\n\nTudo funcionou bem no iPhone 13 e no iPhone SE, mas travou em um **iPad Pro 2018** apĂłs alguns minutos. O reflexo seria dizer âaparelho antigo, menos memĂłriaâ, mas esse iPad tem os *mesmos* 4 GB dos telefones, ou atĂŠ mais. O que ĂŠ diferente ĂŠ uma **tela muito maior** e, neste dia, uma cĂ˘mera posicionada em **paisagem**. Ambas contaram e entender o porquĂŞ foi a parte mais esclarecedora da construĂ§ĂŁo.\n\nO Web Inspector remoto do Safari foi Ăştil enquanto a pĂĄgina existiu, mas nĂŁo bastava para a falha em si: depois que o processo da GPU morreu, o estado Ăştil jĂĄ deveria estar visĂ­vel no dispositivo. O aplicativo, portanto, ganhou uma **linha de diagnĂłstico** â impressa a cada dez segundos e *escrita na prĂłpria tela de travamento* â que informa a taxa de quadros, o nĂşmero de clipes, o nĂşmero de codificadores e o total de bytes de todas as texturas alocadas. Uma captura de tela da falha tornou-se um relatĂłrio completo.\n\n\u003cCallout type=\"info\" title=\"War story: era memĂłria GPU, nĂŁo RAM â e o iOS nĂŁo diz isso\"\u003e\nA falha sempre foi uma alocaĂ§ĂŁo de GPU que falhou â `beginRenderPass` ou `importExternalTexture` que nĂŁo dĂĄ mais nada â nunca uma falta de memĂłria de JavaScript. O **processo de GPU** do WebKit tem seu prĂłprio orĂ§amento, separado do heap de pĂĄginas, e uma tela grande e uma cĂ˘mera ao vivo o preenchem rapidamente. Pior: **iOS nĂŁo expĂľe nenhuma API de memĂłria** (`deviceMemory`, `performance.memory`, `measureUserAgentSpecificMemory` sĂŁo apenas para Chrome) e WebGPU nĂŁo relata nenhuma memĂłria de vĂ­deo (VRAM): estamos voando Ă s cegas. E uma vez que esse processo termina, `requestAdapter()` retorna `null`: todo o subsistema ĂŠ perdido, nĂŁo hĂĄ recuperaĂ§ĂŁo, apenas uma recarga.\n\u003c/Callout\u003e\n\nA maior alavanca foi o **ring buffer**. Suas camadas sĂŁo dimensionadas de acordo com a proporĂ§ĂŁo da cĂ˘mera, e um quadro de paisagem contĂŠm aproximadamente **trĂŞs vezes** mais pixels que um retrato. No iPad paisagem, o anel sozinho pesava **248 dos 288 MB**. Limitar o *maior* lado de cada camada em vez de sua altura torna o espaĂ§o ocupado independente da orientaĂ§ĂŁo: 288 MB se tornaram **125 MB**, sem afetar os jĂĄ pequenos iPhones em formato retrato.\n\n\u003cCallout type=\"info\" title=\"War story: codificador Ăşnico, redefiniĂ§ĂŁo entre clipes\"\u003e\nO gravador primeiro criou um novo `VideoEncoder` por clipe. No iOS, isso consome sessĂľes do **VideoToolbox** em excesso e, depois de uma dĂşzia ou duas, a prĂłxima falha e interrompe o processo da GPU. A correĂ§ĂŁo: **apenas um** codificador para toda a sessĂŁo, `reset()` entre os clipes. Isso corrigiu silenciosamente dois outros bugs: reutilizar um codificador entre clipes com carimbos de data e hora que reiniciavam do zero enviava saltos de tempo *para trĂĄs* (quadros corrompidos, congelados), e um codificador compartilhado emite apenas seu `decoderConfig` uma vez, entĂŁo cada clipe apĂłs o primeiro era integrado ao mux sem configuraĂ§ĂŁo e nĂŁo abria. Uma redefiniĂ§ĂŁo limpa torna cada clipe independente e bem formado.\n\u003c/Callout\u003e\n\nO vazamento que estabelecia o teto vinha da cĂ˘mera. `importExternalTexture()` ĂŠ criado sob demanda e o iOS libera lentamente essas texturas externas transitĂłrias. A soluĂ§ĂŁo Ăłbvia â copiar o quadro uma vez para uma textura que possuo e parar de importar â ĂŠ exatamente o que funcionou no final, mas inicialmente quebrou da maneira mais iOS possĂ­vel.\n\n\u003cCallout type=\"info\" title=\"War story: o detector de retĂ˘ngulo preto, depois o fluxo quadrado\"\u003e\nTrocar `importExternalTexture` por `copyExternalImageToTexture` em uma textura prĂłpria removeu o vazamento lento no iPad e, em seguida, renderizou a cĂ˘mera do iPhone como uma imagem esticada com um retĂ˘ngulo lateral preto puro. Fixar um corte no cĂłdigo corrigiu uma orientaĂ§ĂŁo de um telefone e quebrou outra. O primeiro avanĂ§o real foi uma pequena sonda de GPU: varrendo o quadro copiado em resoluĂ§ĂŁo mĂĄxima, contando as linhas e colunas da borda preta pura, ignorando os quadros iniciais totalmente pretos, coletando trĂŞs amostras, depois cortando e recalculando a proporĂ§ĂŁo visĂ­vel antes de armazenar a imagem na fita.\n\nA correĂ§ĂŁo final foi ainda melhor: no celular Apple, solicite a cĂ˘mera como **fluxo quadrado** (`720Ă720`, aspecto `1`). De qualquer forma, Lorenz Clash usa a cĂ˘mera como um material quadrado, e isso leva o WebKit a retornar um quadro centralizado e jĂĄ utilizĂĄvel. O detector de retĂ˘ngulo preto permanece no lugar como diagnĂłstico e substituto, mas o caminho feliz agora registra `track 720x720 aspect=1.000` e `copyCrop=none`. iOS/iPadOS usa esse caminho de cĂłpia de propriedade; desktop e Android mantĂŞm o caminho `externalTexture` mais simples.\n\u003c/Callout\u003e\n\nTambĂŠm houve uma vitĂłria simples antes disso: **apenas toque a cĂ˘mera em quadros que realmente capturem** um depĂłsito de fita. Os depĂłsitos chegam de forma irregular, entĂŁo os quadros intermediĂĄrios criaram texturas Ă  toa. Isso reduziu o vazamento enquanto o caminho da cĂłpia ainda estava instĂĄvel e continua Ăştil porque reduz o trabalho da cĂ˘mera em todos os dispositivos.\n\nA exportaĂ§ĂŁo, em um dispositivo apertado, ĂŠ ao mesmo tempo vĂ­tima e gatilho â e ambas as correĂ§Ăľes sĂŁo a mesma ideia repetida: **reaja, nĂŁo meĂ§a** (vocĂŞ nĂŁo pode medir). Sem uma API de memĂłria para dimensionar a exportaĂ§ĂŁo de acordo com o dispositivo, as **falhas** do codificador tornam-se o sinal: cada falha reduz a reso
